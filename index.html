<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — 토픽 1~5</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #1a1a1f;
    --surface2: #24242b;
    --border: rgba(255,255,255,0.08);
    --accent: #c8f135;
    --text: #f0f0f0;
    --muted: #777;
    --correct: #4ade80;
    --wrong: #f87171;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}

  .screen{display:none;min-height:100vh;position:relative;z-index:1;}
  .screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;}

  /* TITLE */
  #s-title{background:radial-gradient(ellipse at 60% 20%, #1e2d0a 0%, var(--bg) 60%);}
  .eyebrow{font-size:11px;letter-spacing:.3em;color:var(--accent);text-transform:uppercase;margin-bottom:1rem;}
  .big-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(72px,14vw,130px);line-height:.9;text-align:center;color:var(--accent);text-shadow:0 0 80px rgba(200,241,53,.2);}
  .title-desc{font-size:13px;color:var(--muted);margin-top:1rem;text-align:center;line-height:1.8;}
  .topics-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:1rem;}
  .topic-chip{font-size:11px;padding:4px 10px;border:1px solid var(--border);color:var(--muted);}
  .start-btn{margin-top:2rem;background:var(--accent);color:#111;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;padding:14px 40px;border:none;cursor:pointer;letter-spacing:.05em;transition:transform .1s,box-shadow .15s;}
  .start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(200,241,53,.35);}

  /* QUIZ */
  #s-quiz{justify-content:flex-start;padding:0;}
  .quiz-header{width:100%;background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;}
  .q-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);min-width:60px;}
  .prog-wrap{flex:1;height:4px;background:var(--surface2);}
  .prog-fill{height:100%;background:var(--accent);transition:width .4s;}
  .topic-tag{font-size:11px;padding:3px 10px;border:1px solid var(--border);color:var(--muted);white-space:nowrap;}
  .quiz-body{width:100%;max-width:580px;padding:2.5rem 1rem 3rem;display:flex;flex-direction:column;}
  .q-text{font-size:17px;font-weight:500;line-height:1.65;margin-bottom:1.5rem;}
  .opts{display:flex;flex-direction:column;gap:8px;}
  .opt{text-align:left;padding:13px 16px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;cursor:pointer;transition:border-color .12s,background .12s;line-height:1.45;}
  .opt:hover:not(:disabled){border-color:rgba(255,255,255,.22);background:var(--surface2);}
  .opt.correct{background:rgba(74,222,128,.1);border-color:var(--correct);color:var(--correct);}
  .opt.wrong{background:rgba(248,113,113,.1);border-color:var(--wrong);color:var(--wrong);}
  .opt.reveal{background:rgba(74,222,128,.06);border-color:rgba(74,222,128,.35);color:rgba(74,222,128,.65);}
  .fb-box{margin-top:1rem;padding:12px 16px;border-left:3px solid var(--accent);background:var(--surface);font-size:13px;line-height:1.65;color:var(--muted);}
  .fb-box.correct{border-color:var(--correct);}
  .fb-box.wrong{border-color:var(--wrong);}
  .next-row{margin-top:1.25rem;display:flex;justify-content:flex-end;}
  .next-btn{background:var(--accent);color:#111;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;padding:11px 28px;border:none;cursor:pointer;}
  .next-btn:disabled{opacity:.25;cursor:default;}

  /* RESULT */
  #s-result{background:radial-gradient(ellipse at 30% 80%, #0a1a0a 0%, var(--bg) 55%);}
  .result-wrap{width:100%;max-width:460px;text-align:center;}
  .score-label{font-size:12px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:.5rem;}
  .score-big{font-family:'Bebas Neue',sans-serif;font-size:100px;line-height:1;color:var(--accent);}
  .score-total{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--muted);}
  .score-msg{font-size:15px;color:var(--text);margin-top:1rem;line-height:1.6;}
  .result-actions{display:flex;flex-direction:column;gap:8px;margin-top:2rem;}
  .btn-ghost{background:transparent;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;padding:11px 24px;border:1px solid var(--border);cursor:pointer;transition:border-color .15s,background .15s;}
  .btn-ghost:hover{border-color:rgba(255,255,255,.2);background:var(--surface);}

  @media(max-width:480px){.big-title{font-size:72px;}.quiz-body{padding:2rem .75rem 2.5rem;}}
</style>
</head>
<body>

<!-- TITLE -->
<div id="s-title" class="screen active">
  <p class="eyebrow">Study Quiz</p>
  <h1 class="big-title">QUIZ</h1>
  <div class="topics-row">
    <span class="topic-chip">Turner</span>
    <span class="topic-chip">Cubism</span>
    <span class="topic-chip">암석</span>
    <span class="topic-chip">대수층</span>
    <span class="topic-chip">신고전주의 vs 낭만주의</span>
  </div>
  <p class="title-desc">31문제 · 랜덤 출제 · 즉시 해설</p>
  <button class="start-btn" onclick="startQuiz()">시작하기</button>
</div>

<!-- QUIZ -->
<div id="s-quiz" class="screen">
  <div class="quiz-header">
    <span class="q-num" id="q-num">1 / 31</span>
    <div class="prog-wrap"><div class="prog-fill" id="prog"></div></div>
    <span class="topic-tag" id="topic-tag"></span>
  </div>
  <div class="quiz-body">
    <div class="q-text" id="q-text"></div>
    <div class="opts" id="opts"></div>
    <div id="fb"></div>
    <div class="next-row"><button class="next-btn" id="next-btn" onclick="nextQ()" disabled>다음 →</button></div>
  </div>
</div>

<!-- RESULT -->
<div id="s-result" class="screen">
  <div class="result-wrap">
    <div class="score-label">최종 점수</div>
    <div><span class="score-big" id="s-score">0</span><span class="score-total" id="s-total"> / 31</span></div>
    <div class="score-msg" id="s-msg"></div>
    <div class="result-actions">
      <button class="start-btn" onclick="restart()">다시 풀기</button>
      <button class="btn-ghost" onclick="goTo('s-title')">처음으로</button>
    </div>
  </div>
</div>

<script>
const ALL_Q = [
  {t:"Turner",q:"Turner는 어느 시대 화가인가?",o:["15~16세기","18~19세기","20세기 초","중세"],a:1,e:"Turner는 18~19세기 영국 풍경·해경화가입니다."},
  {t:"Turner",q:"Turner가 주로 사용한 재료 두 가지는?",o:["조각+프레스코","수채화+유화","템페라+모자이크","파스텔+잉크"],a:1,e:"Turner는 watercolors(수채화)와 oils(유화)를 사용했습니다."},
  {t:"Turner",q:"Turner의 초기 스타일 특징은?",o:["추상적, 선명한 색채","재난·강렬함·자유","사실주의, 자연의 아름다움, 건축물","콜라주 기법"],a:2,e:"초기 Turner는 사실적 묘사와 자연의 아름다움, 건축물이 특징입니다."},
  {t:"Turner",q:"Turner의 후기 작품 분위기와 거리가 먼 것은?",o:["자연 재해","추상적 표현","선명한 색채","세밀한 건축 묘사"],a:3,e:"세밀한 건축 묘사는 초기 스타일입니다. 후기는 재난·추상·선명한 색채가 특징입니다."},
  {t:"Turner",q:"Turner가 속한 미술 사조는?",o:["인상주의","입체파","낭만주의","신고전주의"],a:2,e:"Turner 자신은 낭만주의(Romanticism) 화가입니다."},
  {t:"Turner",q:"Turner가 미래에 영향을 준 사조는?",o:["입체파","인상주의","표현주의","팝아트"],a:1,e:"Turner는 낭만주의 화가지만 훗날 인상주의에 영향을 미쳤습니다."},
  {t:"Cubism",q:"입체파의 첫 번째 단계 명칭은?",o:["Synthetic Cubism","Abstract Cubism","Analytic Cubism","Structural Cubism"],a:2,e:"1907~1912년의 1단계는 Analytic Cubism(분석적 입체파)입니다."},
  {t:"Cubism",q:"Analytic Cubism의 색채 특징은?",o:["선명한 원색 위주","단색조(갈색·회색 등)","무지개색 팔레트","흑백만 사용"],a:1,e:"Analytic Cubism은 모노크로매틱(단색조) 색상을 사용합니다."},
  {t:"Cubism",q:"Synthetic Cubism의 가장 큰 특징은?",o:["단색조 팔레트","사실적 원근법","콜라주 기법과 실물 재료 사용","수채화 위주"],a:2,e:"Synthetic Cubism(1912~1919)은 콜라주 기법과 신문지 등 실물 재료를 활용합니다."},
  {t:"Cubism",q:"입체파 회화의 주된 재료(medium)는?",o:["수채화 on paper","Oil on canvas","Fresco on wall","Pastel on board"],a:1,e:"입체파 작품은 oil on canvas(캔버스에 유화)를 사용했습니다."},
  {t:"Cubism",q:"입체파의 창시자로 꼽히는 화가는?",o:["Claude Monet","Salvador Dalí","Pablo Picasso","Vincent van Gogh"],a:2,e:"입체파의 첫 창시자는 Pablo Picasso입니다."},
  {t:"Cubism",q:"Cubism이 현대 미술에 미친 영향은?",o:["인상주의를 완성시킴","자연 모방에서 벗어나 현대 미술에 큰 충격을 줌","사실주의를 강화함","조각 예술에만 영향을 줌"],a:1,e:"Cubism은 자연 모방을 탈피해 현대 미술 전반에 큰 영향을 미쳤습니다."},
  {t:"암석",q:"퇴적암이 형성되는 방식은?",o:["마그마가 식어서","퇴적물이 쌓이고 굳어서","고온·고압으로 변환되어","화산 폭발 후 냉각되어"],a:1,e:"퇴적암은 퇴적물이 쌓여 전기력 등으로 결합되어 형성됩니다."},
  {t:"암석",q:"화성암의 생성 원리는?",o:["퇴적물 압축","마그마가 냉각되어","물이 운반하는 화학 성분에 의해","퇴적암이 변환되어"],a:1,e:"화성암은 마그마가 냉각되어 형성됩니다."},
  {t:"암석",q:"마그마가 느리게 냉각되면 어떤 암석이 되는가?",o:["흑요석(Obsidian)","현무암(Basalt)","화강암(Granite)","대리석(Marble)"],a:2,e:"느린 냉각 → 화강암(Granite), 빠른 냉각 → 흑요석·현무암"},
  {t:"암석",q:"변성암을 만드는 조건이 아닌 것은?",o:["고온","고압","물(수분)","빠른 냉각"],a:3,e:"빠른 냉각은 화성암 형성 조건입니다. 변성암은 고온+고압+수분이 필요합니다."},
  {t:"암석",q:"대리석(Marble)은 어떤 종류의 암석인가?",o:["퇴적암","화성암","변성암","복합암"],a:2,e:"대리석은 변성암(Metamorphic Rock)의 예시입니다."},
  {t:"암석",q:"퇴적암의 물리적 특성으로 맞는 것은?",o:["매우 단단하고 고밀도","무른 편이고 지표면과 평행한 층 형성","불규칙한 결정 구조","열과 압력에 강함"],a:1,e:"퇴적암은 무른(fragile) 편이고 지표면과 평행한 층을 이룹니다."},
  {t:"암석",q:"암석 변환 순서 중 맞는 것은?",o:["변성암 → 화성암 (녹아서)","퇴적암 → 화성암 (고온·고압으로)","화성암 → 변성암 (고온·고압으로)","변성암 → 화성암 (냉각되어)"],a:2,e:"화성암 → (고온·고압) → 변성암 / 퇴적암 → (녹아서) → 화성암"},
  {t:"대수층",q:"자유면 대수층(Unconfined Aquifer)의 특징은?",o:["불투수층 위에 위치","빗물이 침투하는 투수층 아래 위치","크기 제한이 있음","수압이 매우 높음"],a:1,e:"자유면 대수층은 투수성 지층 아래에 위치하며 빗물이 침투해 형성됩니다."},
  {t:"대수층",q:"피압 대수층(Confined Aquifer)의 특징은?",o:["투수층 바로 아래","크기 제한 없음","불투수층 아래, 높은 수압","빗물로 빠르게 충전"],a:2,e:"피압 대수층은 불투수성 암석·점토층 아래에 위치하며 수압이 높고 충전이 느립니다."},
  {t:"대수층",q:"대수층의 주요 활용 용도는?",o:["화석 연료 추출","농업용수·생활용수","광물 채굴","지열 발전"],a:1,e:"대수층은 farming(농업)과 domestic life(생활용수)에 사용됩니다."},
  {t:"대수층",q:"Texas Edward Aquifer에 대한 설명으로 맞는 것은?",o:["현재 수위가 계속 상승 중","서서히 고갈되고 있음","피압 대수층의 대표 사례","인공적으로 만든 대수층"],a:1,e:"Texas Edward Aquifer는 서서히 고갈(drying out)되고 있다고 언급됩니다."},
  {t:"Neo vs Rom",q:"신고전주의에서 가장 중요하게 여긴 가치는?",o:["잠재력(Potential)","질서(Order)","혁신(Innovation)","자연(Nature)"],a:1,e:"신고전주의는 질서(Order)를 매우 중시했습니다."},
  {t:"Neo vs Rom",q:"신고전주의에서 개인과 사회의 관계는?",o:["개인 > 사회","사회 > 개인","개인 = 사회","사회를 부정함"],a:1,e:"신고전주의는 사회 > 개인을 강조합니다."},
  {t:"Neo vs Rom",q:"신고전주의 작가들이 사용한 주요 기법은?",o:["상상력과 감정","풍자와 재치(Satire & Wit)","혁명과 도전","자연 묘사"],a:1,e:"신고전주의는 풍자와 재치(satire & wit)를 통해 사회의 옳고 그름을 제시했습니다."},
  {t:"Neo vs Rom",q:"Jonathan Swift가 풍자로 비판한 대상은?",o:["프랑스 혁명","당시 영국 사회","자연 재해","종교 제도"],a:1,e:"Jonathan Swift는 풍자와 재치를 사용해 당시 영국 사회를 비판했습니다."},
  {t:"Neo vs Rom",q:"낭만주의에서 중요하게 여긴 가치는?",o:["질서","현재에 충실","잠재력(Potential)","사회 규범"],a:2,e:"낭만주의는 개인의 잠재력(Potential)을 높이 평가했습니다."},
  {t:"Neo vs Rom",q:"낭만주의의 특징으로 맞는 것은?",o:["사회 규범과 질서 강조","미래·자연에 관심, 혁신·모험 추구","독자에게 교훈을 전달","현재 사회를 충실히 묘사"],a:1,e:"낭만주의는 자연과 미래에 관심을 갖고 혁신, 혁명, 상상력을 중시했습니다."},
  {t:"Neo vs Rom",q:"신고전주의의 시간적 관심사는?",o:["과거","미래","현재에 충실","초월적 시간"],a:2,e:"신고전주의는 현재(present)에 충실한 것을 강조했습니다."},
  {t:"Neo vs Rom",q:"낭만주의에서 개인과 사회의 관계는?",o:["사회 > 개인","개인 > 사회","둘 다 동등","개인을 부정"],a:1,e:"낭만주의는 개인 > 사회를 강조합니다."},
];

let qs=[],cur=0,score=0,answered=false;

function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function shuffle(a){return [...a].sort(()=>Math.random()-.5);}

function startQuiz(){
  qs=shuffle(ALL_Q);cur=0;score=0;
  goTo('s-quiz');renderQ();
}

function renderQ(){
  if(cur>=qs.length){showResult();return;}
  const q=qs[cur];answered=false;
  document.getElementById('q-num').textContent=`${cur+1} / ${qs.length}`;
  document.getElementById('prog').style.width=((cur/qs.length)*100)+'%';
  document.getElementById('topic-tag').textContent=q.t;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('fb').innerHTML='';
  document.getElementById('next-btn').disabled=true;
  document.getElementById('opts').innerHTML=q.o.map((o,i)=>
    `<button class="opt" onclick="pick(${i})">${o}</button>`
  ).join('');
}

function pick(i){
  if(answered)return;answered=true;
  const q=qs[cur];const ok=i===q.a;
  if(ok)score++;
  document.querySelectorAll('.opt').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a)b.classList.add(ok&&idx===i?'correct':'reveal');
    else if(idx===i)b.classList.add('wrong');
  });
  const fb=document.getElementById('fb');
  fb.className='fb-box '+(ok?'correct':'wrong');
  fb.textContent=(ok?'정답! ':'오답. ')+q.e;
  document.getElementById('next-btn').disabled=false;
}

function nextQ(){cur++;renderQ();}

function showResult(){
  const pct=Math.round((score/qs.length)*100);
  document.getElementById('s-score').textContent=score;
  document.getElementById('s-total').textContent=' / '+qs.length;
  document.getElementById('s-msg').textContent=
    pct>=90?'완벽해요! 시험 준비 끝':
    pct>=70?'잘 했어요! 틀린 것만 다시 확인해봐요.':
    pct>=50?'절반 이상! 조금만 더 복습해봐요.':
    '다시 한번 복습하고 도전해봐요!';
  goTo('s-result');
}

function restart(){startQuiz();}
</script>
</body>
</html>
