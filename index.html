<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Quiz</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0c0c0f;
            --surface: #15151a;
            --surface2: #1e1e26;
            --border: #2a2a35;
            --accent: #e8ff47;
            --accent2: #ff6b47;
            --accent3: #47c8ff;
            --text: #f0f0f5;
            --muted: #6b6b80;
            --easy: #47e87a;
            --medium: #ffb347;
            --hard: #ff4766;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(232, 255, 71, 0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -200px;
            right: -200px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(71, 200, 255, 0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── SCREENS ── */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* ── HOME ── */
        #home {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 24px 80px;
        }

        .home-header {
            margin-bottom: 56px;
        }

        .home-header .label {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 12px;
        }

        .home-header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(64px, 10vw, 110px);
            line-height: 0.9;
            letter-spacing: 2px;
            color: var(--text);
        }

        .home-header h1 span {
            color: var(--accent);
            display: block;
        }

        .home-header p {
            margin-top: 20px;
            color: var(--muted);
            font-size: 15px;
            max-width: 400px;
            line-height: 1.6;
        }

        .parts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
            margin-bottom: 40px;
        }

        .part-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .part-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            transform: scaleX(0);
            transition: transform 0.2s;
            transform-origin: left;
        }

        .part-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .part-card:hover::before {
            transform: scaleX(1);
        }

        .part-card .part-num {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .part-card h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .part-card .stars {
            font-size: 12px;
            margin-bottom: 4px;
        }

        .part-card .q-count {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        .start-btns {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 14px;
            padding: 14px 28px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--accent);
            color: #0c0c0f;
        }

        .btn-primary:hover {
            background: #d4e83c;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── QUIZ ── */
        #quiz {
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        .quiz-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            gap: 16px;
        }

        .quiz-progress-wrap {
            flex: 1;
        }

        .quiz-progress-label {
            display: flex;
            justify-content: space-between;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .progress-bar {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.4s ease;
        }

        .btn-quit {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-quit:hover {
            border-color: var(--hard);
            color: var(--hard);
        }

        .question-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px;
            margin-bottom: 20px;
        }

        .q-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .q-part-tag {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 4px;
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .q-diff {
            font-size: 12px;
        }

        .q-diff.easy {
            color: var(--easy);
        }

        .q-diff.medium {
            color: var(--medium);
        }

        .q-diff.hard {
            color: var(--hard);
        }

        .q-diff-label {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 1px;
            margin-left: 4px;
        }

        .q-diff.easy .q-diff-label {
            color: var(--easy);
        }

        .q-diff.medium .q-diff-label {
            color: var(--medium);
        }

        .q-diff.hard .q-diff-label {
            color: var(--hard);
        }

        .q-text {
            font-size: 18px;
            font-weight: 500;
            line-height: 1.55;
            margin-bottom: 28px;
            color: var(--text);
        }

        .options {
            display: grid;
            gap: 10px;
        }

        .option {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 14px;
            line-height: 1.45;
            text-align: left;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
        }

        .option:hover:not([disabled]) {
            border-color: var(--accent);
            background: rgba(232, 255, 71, 0.05);
        }

        .option .opt-letter {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            min-width: 16px;
            margin-top: 1px;
            transition: color 0.15s;
        }

        .option:hover:not([disabled]) .opt-letter {
            color: var(--accent);
        }

        .option.correct {
            border-color: var(--easy);
            background: rgba(71, 232, 122, 0.08);
        }

        .option.correct .opt-letter {
            color: var(--easy);
        }

        .option.wrong {
            border-color: var(--hard);
            background: rgba(255, 71, 102, 0.08);
        }

        .option.wrong .opt-letter {
            color: var(--hard);
        }

        .option[disabled] {
            cursor: default;
        }

        /* explanation */
        .explanation {
            display: none;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent3);
            border-radius: 10px;
            padding: 18px 20px;
            margin-bottom: 20px;
            animation: fadeUp 0.3s ease;
        }

        .explanation.show {
            display: block;
        }

        .explanation .exp-label {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--accent3);
            margin-bottom: 8px;
        }

        .explanation p {
            font-size: 14px;
            line-height: 1.6;
            color: #c0c0cc;
        }

        .quiz-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── RESULT ── */
        #result {
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 24px 80px;
            text-align: center;
        }

        .result-score-big {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(80px, 20vw, 140px);
            line-height: 1;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .result-label {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            letter-spacing: 3px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .result-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            margin-bottom: 48px;
        }

        .stat-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 28px;
            min-width: 120px;
        }

        .stat-box .stat-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 40px;
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-box .stat-name {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--muted);
            text-transform: uppercase;
        }

        .stat-box.correct .stat-num {
            color: var(--easy);
        }

        .stat-box.wrong .stat-num {
            color: var(--hard);
        }

        .result-breakdown {
            text-align: left;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .breakdown-title {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--muted);
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
        }

        .breakdown-item {
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: 24px 1fr auto;
            gap: 12px;
            align-items: start;
            font-size: 13px;
        }

        .breakdown-item:last-child {
            border-bottom: none;
        }

        .bd-icon {
            font-size: 14px;
            margin-top: 1px;
        }

        .bd-q {
            line-height: 1.45;
            color: var(--text);
        }

        .bd-q .bd-ans {
            font-size: 12px;
            color: var(--muted);
            margin-top: 3px;
        }

        .bd-q .bd-ans span {
            color: var(--easy);
        }

        .bd-correct {
            color: var(--easy);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
        }

        .bd-wrong {
            color: var(--hard);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
        }

        .result-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* ── PART SELECT MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            max-width: 520px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .modal p {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .modal-parts {
            display: grid;
            gap: 8px;
            margin-bottom: 24px;
        }

        .modal-part-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.15s;
        }

        .modal-part-row:hover {
            border-color: var(--accent);
        }

        .modal-part-row input[type=checkbox] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .modal-part-row label {
            flex: 1;
            font-size: 13px;
            cursor: pointer;
            line-height: 1.4;
        }

        .modal-part-row .m-stars {
            font-size: 11px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .score-message {
            font-size: 16px;
            color: var(--muted);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .score-message strong {
            color: var(--text);
        }

        /* ── DIFF FILTER ── */
        .diff-filter {
            margin-bottom: 24px;
        }

        .diff-filter-label {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .diff-pills {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .diff-pill {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            padding: 7px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s;
        }

        .diff-pill:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .diff-pill.easy.active {
            background: var(--easy);
            color: #0c0c0f;
            border-color: var(--easy);
        }

        .diff-pill.medium.active {
            background: var(--medium);
            color: #0c0c0f;
            border-color: var(--medium);
        }

        .diff-pill.hard.active {
            background: var(--hard);
            color: #fff;
            border-color: var(--hard);
        }

        .diff-pill.all.active {
            background: var(--accent);
            color: #0c0c0f;
            border-color: var(--accent);
        }

        .diff-section-title {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--muted);
            margin: 28px 0 10px;
            text-transform: uppercase;
        }

        /* ── TEXT ANSWER QUESTIONS ── */
        .q-type-badge {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 1.5px;
            padding: 3px 9px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .q-type-badge.mcq {
            background: rgba(232, 255, 71, 0.1);
            color: var(--accent);
            border: 1px solid rgba(232, 255, 71, 0.25);
        }

        .q-type-badge.short {
            background: rgba(71, 200, 255, 0.1);
            color: var(--accent3);
            border: 1px solid rgba(71, 200, 255, 0.25);
        }

        .q-type-badge.essay {
            background: rgba(255, 107, 71, 0.1);
            color: var(--accent2);
            border: 1px solid rgba(255, 107, 71, 0.25);
        }

        .text-answer-wrap {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .text-hint {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--accent3);
        }

        .text-answer-input,
        .text-answer-textarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        .text-answer-textarea {
            font-size: 14px;
            resize: vertical;
            min-height: 110px;
            line-height: 1.6;
        }

        .text-answer-input:focus,
        .text-answer-textarea:focus {
            border-color: var(--accent3);
            box-shadow: 0 0 0 3px rgba(71, 200, 255, 0.08);
        }

        .text-answer-input:disabled,
        .text-answer-textarea:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .text-feedback {
            border-radius: 10px;
            padding: 14px 18px;
            border: 1px solid;
            animation: fadeUp 0.3s ease;
        }

        .text-feedback.correct {
            border-color: var(--easy);
            background: rgba(71, 232, 122, 0.08);
        }

        .text-feedback.wrong {
            border-color: var(--hard);
            background: rgba(255, 71, 102, 0.08);
        }

        .feedback-score {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .feedback-icon {
            font-size: 16px;
        }

        .text-feedback.correct .feedback-icon {
            color: var(--easy);
        }

        .text-feedback.wrong .feedback-icon {
            color: var(--hard);
        }

        .feedback-pct {
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            font-weight: 600;
        }

        .text-feedback.correct .feedback-pct {
            color: var(--easy);
        }

        .text-feedback.wrong .feedback-pct {
            color: var(--hard);
        }

        .feedback-verdict {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--muted);
        }

        .feedback-answer {
            font-size: 13px;
            line-height: 1.55;
        }

        .feedback-ans-label {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            margin-right: 6px;
        }

        .feedback-ans-text {
            color: var(--text);
            font-style: italic;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0)
            }

            25% {
                transform: translateX(-5px)
            }

            75% {
                transform: translateX(5px)
            }
        }

        .shake {
            animation: shake 0.3s ease;
            border-color: var(--hard) !important;
        }
    </style>
</head>

<body>

    <!-- HOME -->
    <div id="home" class="screen active">
        <div class="home-header">
            <div class="label">// Study Quiz System</div>
            <h1>MASTER<span>QUIZ</span></h1>
            <p>각 파트에서 문제를 풀며 학습 내용을 점검하세요. 매번 새롭게 섞인 문제가 출제됩니다.</p>
        </div>

        <div class="parts-grid" id="partsGrid"></div>

        <div class="diff-section-title">// Difficulty Filter</div>
        <div class="diff-filter">
            <div class="diff-pills">
                <button class="diff-pill all active" id="dpAll" onclick="setDiff('all')">ALL</button>
                <button class="diff-pill easy" id="dpEasy" onclick="setDiff(1)">★ EASY</button>
                <button class="diff-pill medium" id="dpMed" onclick="setDiff(2)">★★ MEDIUM</button>
                <button class="diff-pill hard" id="dpHard" onclick="setDiff(3)">★★★ HARD</button>
            </div>
        </div>

        <div class="start-btns">
            <button class="btn btn-primary" onclick="startFullQuiz()">🎯 전체 퀴즈 시작 (30문제)</button>
            <button class="btn btn-secondary" onclick="openPartModal()">📂 파트 선택 후 시작</button>
        </div>
    </div>

    <!-- QUIZ -->
    <div id="quiz" class="screen">
        <div class="quiz-header">
            <div class="quiz-progress-wrap">
                <div class="quiz-progress-label">
                    <span id="qProgressLabel">문제 1 / 30</span>
                    <span id="qScoreLabel">0점</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width:0%"></div>
                </div>
            </div>
            <button class="btn-quit" onclick="confirmQuit()">QUIT</button>
        </div>

        <div class="question-card">
            <div class="q-meta">

        // ═══════════════════════════════════════════════════════
        // HELPERS
        // ═══════════════════════════════════════════════════════
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function getDiffInfo(d) {
            if (d === 1) return { label: 'EASY', stars: '★☆☆', cls: 'easy' };
            if (d === 2) return { label: 'MEDIUM', stars: '★★☆', cls: 'medium' };
            return { label: 'HARD', stars: '★★★', cls: 'hard' };
        }

        function buildQuiz(partIds, diffs) {
            const TOTAL = 30;
            const MIN_PER_PART = 2;
            const activeDiffs = (diffs && diffs.length > 0) ? diffs : [1, 2, 3];

            const pools = {};
            partIds.forEach(pid => {
                pools[pid] = shuffle(QUESTIONS.filter(q => q.part === pid && activeDiffs.includes(q.diff)));
            });

            const selected = [];
            // guarantee minimum 2 per part
            partIds.forEach(pid => {
                const take = pools[pid].slice(0, MIN_PER_PART);
                take.forEach(q => selected.push({ ...q }));
                pools[pid] = pools[pid].slice(MIN_PER_PART);
            });

            // fill remaining
            const remaining = shuffle(
                partIds.flatMap(pid => pools[pid])
            );
            for (const q of remaining) {
                if (selected.length >= TOTAL) break;
                selected.push({ ...q });
            }

            // shuffle options per question (skip for text-type questions)
            return shuffle(selected).map(q => {
                if (q.type === 'short' || q.type === 'essay') return { ...q };
                const correctText = q.opts[q.ans];
                const shuffledOpts = shuffle(q.opts);
                return {
                    ...q,
                    opts: shuffledOpts,
                    ans: shuffledOpts.indexOf(correctText),
                };
            });
        }

        // ═══════════════════════════════════════════════════════
        function initHome() {
            const grid = document.getElementById('partsGrid');
            grid.innerHTML = PARTS.map(p => {
                const count = QUESTIONS.filter(q => q.part === p.id).length;
                return `<div class="part-card" onclick="startPartQuiz(${p.id})">
      <div class="part-num">PART ${p.id}</div>
      <h3>${p.name}</h3>
      <div class="stars">${STARS[p.id]}</div>
      <div class="q-count">${count}문제</div>
    </div>`;
            }).join('');
            updateDiffPills();
        }

        function setDiff(d) {
            if (d === 'all') {
                state.selectedDiffs = [1, 2, 3];
            } else {
                const idx = state.selectedDiffs.indexOf(d);
                if (idx === -1) {
                    state.selectedDiffs.push(d);
                } else if (state.selectedDiffs.length > 1) {
                    state.selectedDiffs.splice(idx, 1);
                }
            }
            updateDiffPills();
        }

        function updateDiffPills() {
            const isAll = [1, 2, 3].every(d => state.selectedDiffs.includes(d));
            const g = id => document.getElementById(id);
            if (g('dpAll')) g('dpAll').classList.toggle('active', isAll);
            if (g('dpEasy')) g('dpEasy').classList.toggle('active', !isAll && state.selectedDiffs.includes(1));
            if (g('dpMed')) g('dpMed').classList.toggle('active', !isAll && state.selectedDiffs.includes(2));
            if (g('dpHard')) g('dpHard').classList.toggle('active', !isAll && state.selectedDiffs.includes(3));
        }

            state.lastPartIds = [...partIds];
            state.lastDiffs = [...useDiffs];
            state.quizQuestions = buildQuiz(partIds, useDiffs);
            state.currentIdx = 0;
            state.results = [];
            showScreen('quiz');
            renderQuestion();
        }

        function replayQuiz() {
            startQuiz(state.lastPartIds, state.lastDiffs);
        }

        function openPartModal() {
            const mp = document.getElementById('modalParts');
            mp.innerHTML = PARTS.map(p => {
                const count = QUESTIONS.filter(q => q.part === p.id).length;
                return `<div class="modal-part-row">
      <input type="checkbox" id="mp${p.id}" value="${p.id}" checked>
      <label for="mp${p.id}">
        <strong>Part ${p.id}:</strong> ${p.name}
        <div style="color:var(--muted);font-size:11px;margin-top:2px">${STARS[p.id]} · ${count}문제</div>
      </label>
    </div>`;
            }).join('');
            document.getElementById('modalOverlay').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        function startCustomQuiz() {
            const checks = document.querySelectorAll('#modalParts input[type=checkbox]:checked');
            const ids = Array.from(checks).map(c => parseInt(c.value));
            if (ids.length === 0) { alert('최소 1개 파트를 선택해주세요!'); return; }
            closeModal();
            startQuiz(ids);
        }

        // ═══════════════════════════════════════════════════════
        // RENDER QUESTION
        // ═══════════════════════════════════════════════════════
        function renderQuestion() {
            const q = state.quizQuestions[state.currentIdx];
            const total = state.quizQuestions.length;
            const part = PARTS.find(p => p.id === q.part);
            const diff = getDiffInfo(q.diff);
            const qtype = q.type || 'mcq';

            // header
            document.getElementById('qProgressLabel').textContent = `문제 ${state.currentIdx + 1} / ${total}`;
            document.getElementById('qScoreLabel').textContent = `${state.results.filter(r => r).length}점`;
            document.getElementById('progressFill').style.width = `${(state.currentIdx / total) * 100}%`;

            // meta
            document.getElementById('qPartTag').textContent = `PART ${q.part}: ${part.short}`;
            const diffEl = document.getElementById('qDiff');
            diffEl.className = `q-diff ${diff.cls}`;
            diffEl.innerHTML = `${diff.stars}<span class="q-diff-label">${diff.label}</span>`;
            const badge = document.getElementById('qTypeBadge');
            if (badge) {
                const labels = { mcq: 'MCQ', short: 'SHORT ANSWER', essay: 'ESSAY' };
                badge.textContent = labels[qtype] || 'MCQ';
                badge.className = `q-type-badge ${qtype}`;
            }

            // question
            document.getElementById('qText').textContent = q.q;

            // render answer area
            const wrap = document.getElementById('optionsWrap');
            if (qtype === 'mcq') {
                const letters = ['A', 'B', 'C', 'D'];
                wrap.innerHTML = q.opts.map((opt, i) =>
                    `<button class="option" onclick="selectAnswer(${i})">
          <span class="opt-letter">${letters[i]}</span>
          <span>${opt}</span>
        </button>`
                ).join('');
            } else {
                const isEssay = qtype === 'essay';
                wrap.innerHTML = `
                    <div class="text-answer-wrap">
                        <div class="text-hint">// Answer in English${isEssay ? ' &nbsp;·&nbsp; Include key concepts' : ''}</div>
                        ${isEssay
                        ? `<textarea id="textAnswerInput" class="text-answer-textarea" placeholder="Write your answer here..."></textarea>`
                        : `<input type="text" id="textAnswerInput" class="text-answer-input" placeholder="Type your answer...">`
                    }
                        <button class="btn btn-primary" onclick="submitTextAnswer()" id="submitTextBtn" style="align-self:flex-start">Submit →</button>
                    </div>`;
                setTimeout(() => {
                    const inp = document.getElementById('textAnswerInput');
                    if (inp) {
                        inp.focus();
                        if (!isEssay) inp.addEventListener('keydown', e => { if (e.key === 'Enter') submitTextAnswer(); });
                    }
                }, 60);
            }

            // explanation
            document.getElementById('explanationBox').classList.remove('show');
            document.getElementById('nextBtn').style.display = 'none';
            state.answered = false;
        }

        // ═══════════════════════════════════════════════════════
        // SIMILARITY ALGORITHM
        // ═══════════════════════════════════════════════════════
        function normalizeText(str) {
            return str.toLowerCase().trim().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ');
        }
        function levenshtein(a, b) {
            const m = a.length, n = b.length;
            const dp = Array.from({ length: m + 1 }, (_, i) =>
                Array.from({ length: n + 1 }, (_, j) => i === 0 ? j : j === 0 ? i : 0)
            );
            for (let i = 1; i <= m; i++)
                for (let j = 1; j <= n; j++)
                    dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1]
                        : 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
            return dp[m][n];
        }
        function similarityScore(input, correct) {
            const a = normalizeText(input);
            const b = normalizeText(correct);
            if (!a || !b) return 0;
            if (a === b) return 1.0;
            if (b.includes(a) || a.includes(b)) return 0.9;
            const maxLen = Math.max(a.length, b.length);
            const levScore = maxLen > 0 ? 1 - levenshtein(a, b) / maxLen : 0;
            const aWords = new Set(a.split(' ').filter(w => w.length > 2));
            const bWords = [...b.split(' ').filter(w => w.length > 2)];
            const overlap = bWords.filter(w => aWords.has(w)).length;
            const wordScore = bWords.length > 0 ? overlap / bWords.length : 0;
            return Math.max(levScore * 0.35 + wordScore * 0.65, levScore);
        }

        // ═══════════════════════════════════════════════════════
        // SUBMIT TEXT ANSWER
        // ═══════════════════════════════════════════════════════
        function submitTextAnswer() {
            if (state.answered) return;
            const inp = document.getElementById('textAnswerInput');
            if (!inp) return;
            const userInput = inp.value.trim();
            if (!userInput) {
                inp.classList.add('shake');
                setTimeout(() => inp.classList.remove('shake'), 400);
                return;
            }
            state.answered = true;
            inp.disabled = true;
            const btn = document.getElementById('submitTextBtn');
            if (btn) btn.disabled = true;

            const q = state.quizQuestions[state.currentIdx];
            const qtype = q.type || 'mcq';
            let score = 0;

            if (qtype === 'short') {
                score = similarityScore(userInput, q.ans);
                if (q.keywords && q.keywords.length > 0) {
                    const ni = normalizeText(userInput);
                    const kwHit = q.keywords.filter(kw => ni.includes(kw.toLowerCase())).length / q.keywords.length;
                    score = Math.max(score, kwHit >= 1 ? 0.9 : kwHit >= 0.5 ? 0.75 : score);
                }
            } else if (qtype === 'essay') {
                const ni = normalizeText(userInput);
                const kws = q.keywords || [];
                const matched = kws.filter(kw => ni.includes(kw.toLowerCase())).length;
                const kwScore = kws.length > 0 ? matched / kws.length : similarityScore(userInput, q.ans);
                const simScore = similarityScore(userInput, q.ans);
                score = Math.max(kwScore * 0.7 + simScore * 0.3, kwScore);
            }

            const correct = qtype === 'essay' ? score >= 0.5 : score >= 0.7;
            const pct = Math.round(score * 100);

            // feedback UI
            const wrap = document.getElementById('optionsWrap');
            const fb = document.createElement('div');
            fb.className = `text-feedback ${correct ? 'correct' : 'wrong'}`;
            fb.innerHTML = `
                <div class="feedback-score">
                    <span class="feedback-icon">${correct ? '✓' : '✗'}</span>
                    <span class="feedback-pct">${pct}% match</span>
                    <span class="feedback-verdict">${correct ? 'CORRECT' : 'INCORRECT'}</span>
                </div>
                <div class="feedback-answer">
                    <span class="feedback-ans-label">Model Answer:</span>
                    <span class="feedback-ans-text">${q.ans}</span>
                </div>`;
            wrap.appendChild(fb);

            state.results.push(correct);
            document.getElementById('qScoreLabel').textContent = `${state.results.filter(r => r).length}점`;
            document.getElementById('explanationText').textContent = q.exp;
            document.getElementById('explanationBox').classList.add('show');
            document.getElementById('nextBtn').style.display = 'block';
        }

        // ═══════════════════════════════════════════════════════
        // SELECT ANSWER (MCQ)
        // ═══════════════════════════════════════════════════════
        function selectAnswer(idx) {
            if (state.answered) return;
            state.answered = true;

            const q = state.quizQuestions[state.currentIdx];
            const opts = document.querySelectorAll('.option');
            const correct = idx === q.ans;

            opts.forEach(o => o.disabled = true);
            opts[idx].classList.add(correct ? 'correct' : 'wrong');
            if (!correct) opts[q.ans].classList.add('correct');

            state.results.push(correct);
            document.getElementById('qScoreLabel').textContent = `${state.results.filter(r => r).length}점`;

            document.getElementById('explanationText').textContent = q.exp;
            document.getElementById('explanationBox').classList.add('show');
            document.getElementById('nextBtn').style.display = 'block';
        }

        // ═══════════════════════════════════════════════════════
        // NEXT QUESTION
        // ═══════════════════════════════════════════════════════
        function nextQuestion() {
            state.currentIdx++;
            if (state.currentIdx >= state.quizQuestions.length) {
                showResult();
            } else {
                renderQuestion();
            }
        }

        // ═══════════════════════════════════════════════════════
        // RESULT
        // ═══════════════════════════════════════════════════════
        function showResult() {
            showScreen('result');
            const correct = state.results.filter(r => r).length;
            const total = state.quizQuestions.length;
            const pct = Math.round((correct / total) * 100);

            document.getElementById('resultScore').textContent = pct + '%';
            document.getElementById('statCorrect').textContent = correct;
            document.getElementById('statWrong').textContent = total - correct;
            document.getElementById('statTotal').textContent = total;

            let msg = '';
            if (pct >= 90) msg = '🏆 완벽합니다! <strong>최고의 성과</strong>를 보여줬어요!';
            else if (pct >= 70) msg = '🎉 훌륭해요! 조금만 더 하면 <strong>완벽</strong>해질 거예요.';
            else if (pct >= 50) msg = '💪 중간 수준이에요. <strong>틀린 문제</strong>를 다시 복습해보세요.';
            else msg = '📚 아직 공부가 더 필요해요. <strong>열심히</strong> 복습하면 올라갑니다!';
            document.getElementById('scoreMessage').innerHTML = msg;

            // breakdown
            const list = document.getElementById('breakdownList');
            list.innerHTML = state.quizQuestions.map((q, i) => {
                const r = state.results[i];
                const part = PARTS.find(p => p.id === q.part);
                return `<div class="breakdown-item">
      <span class="bd-icon">${r ? '✓' : '✗'}</span>
      <div class="bd-q">
        <div style="font-size:11px;color:var(--muted);margin-bottom:3px">Part ${q.part} · ${part.short}</div>
        ${q.q}
        ${!r ? `<div class="bd-ans">정답: <span>${(q.type === 'short' || q.type === 'essay') ? q.ans : q.opts[q.ans]}</span></div>` : ''}
      </div>
      <span class="${r ? 'bd-correct' : 'bd-wrong'}">${r ? '맞음' : '틀림'}</span>
    </div>`;
            }).join('');
        }

        // ═══════════════════════════════════════════════════════
        // UTILS
        // ═══════════════════════════════════════════════════════
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0, 0);
        }

        function goHome() { showScreen('home'); }

        function confirmQuit() {
            if (confirm('퀴즈를 그만하시겠어요?')) goHome();
        }

        // ═══════════════════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════════════════
        initHome();
    </script>
</body>
