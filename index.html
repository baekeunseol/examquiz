<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0c0f;
            --surface: #15151a;
            --surface2: #1e1e26;
            --border: #2a2a35;
            --accent: #e8ff47;
            --accent2: #ff6b47;
            --accent3: #47c8ff;
            --text: #f0f0f5;
            --muted: #6b6b80;
            --easy: #47e87a;
            --medium: #ffb347;
            --hard: #ff4766;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
        body::before { content: ''; position: fixed; top: -200px; left: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(232,255,71,0.04) 0%, transparent 70%); pointer-events: none; }
        body::after { content: ''; position: fixed; bottom: -200px; right: -200px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(71,200,255,0.04) 0%, transparent 70%); pointer-events: none; }

        .screen { display: none; }
        .screen.active { display: block; }

        /* HOME */
        #home { max-width: 900px; margin: 0 auto; padding: 60px 24px 80px; }
        .home-header { margin-bottom: 56px; }
        .home-header .label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
        .home-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(64px, 10vw, 110px); line-height: 0.9; letter-spacing: 2px; color: var(--text); }
        .home-header h1 span { color: var(--accent); display: block; }
        .home-header p { margin-top: 20px; color: var(--muted); font-size: 15px; max-width: 400px; line-height: 1.6; }
        .parts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-bottom: 40px; }
        .part-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
        .part-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); transform: scaleX(0); transition: transform 0.2s; transform-origin: left; }
        .part-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .part-card:hover::before { transform: scaleX(1); }
        .part-card .part-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 8px; }
        .part-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 10px; line-height: 1.3; }
        .part-card .stars { font-size: 12px; margin-bottom: 4px; }
        .part-card .q-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
        .start-btns { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn { font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px; padding: 14px 28px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px; }
        .btn-primary { background: var(--accent); color: #0c0c0f; }
        .btn-primary:hover { background: #d4e83c; transform: translateY(-1px); }
        .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
        .btn-all { background: transparent; color: var(--accent3); border: 1px solid var(--accent3); }
        .btn-all:hover { background: rgba(71,200,255,0.08); transform: translateY(-1px); }

        /* QUIZ */
        #quiz { max-width: 720px; margin: 0 auto; padding: 40px 24px 80px; }
        .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; gap: 16px; }
        .quiz-progress-wrap { flex: 1; }
        .quiz-progress-label { display: flex; justify-content: space-between; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
        .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }
        .btn-quit { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
        .btn-quit:hover { border-color: var(--hard); color: var(--hard); }
        .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px; margin-bottom: 20px; }
        .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .q-part-tag { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; padding: 4px 10px; border-radius: 4px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
        .q-diff { font-size: 12px; }
        .q-diff.easy { color: var(--easy); } .q-diff.medium { color: var(--medium); } .q-diff.hard { color: var(--hard); }
        .q-diff-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; margin-left: 4px; }
        .q-diff.easy .q-diff-label { color: var(--easy); } .q-diff.medium .q-diff-label { color: var(--medium); } .q-diff.hard .q-diff-label { color: var(--hard); }
        .q-text { font-size: 18px; font-weight: 500; line-height: 1.55; margin-bottom: 28px; color: var(--text); }
        .options { display: grid; gap: 10px; }
        .option { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: all 0.15s; display: flex; align-items: flex-start; gap: 12px; font-size: 14px; line-height: 1.45; text-align: left; color: var(--text); font-family: 'DM Sans', sans-serif; }
        .option:hover:not([disabled]) { border-color: var(--accent); background: rgba(232,255,71,0.05); }
        .option .opt-letter { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); min-width: 16px; margin-top: 1px; transition: color 0.15s; }
        .option:hover:not([disabled]) .opt-letter { color: var(--accent); }
        .option.correct { border-color: var(--easy); background: rgba(71,232,122,0.08); }
        .option.correct .opt-letter { color: var(--easy); }
        .option.wrong { border-color: var(--hard); background: rgba(255,71,102,0.08); }
        .option.wrong .opt-letter { color: var(--hard); }
        .option[disabled] { cursor: default; }
        .explanation { display: none; background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--accent3); border-radius: 10px; padding: 18px 20px; margin-bottom: 20px; animation: fadeUp 0.3s ease; }
        .explanation.show { display: block; }
        .explanation .exp-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--accent3); margin-bottom: 8px; }
        .explanation p { font-size: 14px; line-height: 1.6; color: #c0c0cc; }
        .quiz-actions { display: flex; justify-content: flex-end; gap: 10px; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* RESULT */
        #result { max-width: 720px; margin: 0 auto; padding: 60px 24px 80px; text-align: center; }
        .result-score-big { font-family: 'Bebas Neue', sans-serif; font-size: clamp(80px, 20vw, 140px); line-height: 1; color: var(--accent); margin-bottom: 4px; }
        .result-label { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 40px; }
        .result-stats { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; margin-bottom: 48px; }
        .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 28px; min-width: 120px; }
        .stat-box .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 40px; line-height: 1; margin-bottom: 4px; }
        .stat-box .stat-name { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
        .stat-box.correct .stat-num { color: var(--easy); }
        .stat-box.wrong .stat-num { color: var(--hard); }
        .result-breakdown { text-align: left; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 40px; }
        .breakdown-title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; color: var(--muted); padding: 16px 24px; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        .breakdown-item { padding: 14px 24px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 24px 1fr auto; gap: 12px; align-items: start; font-size: 13px; }
        .breakdown-item:last-child { border-bottom: none; }
        .bd-icon { font-size: 14px; margin-top: 1px; }
        .bd-q { line-height: 1.45; color: var(--text); }
        .bd-q .bd-ans { font-size: 12px; color: var(--muted); margin-top: 3px; }
        .bd-q .bd-ans span { color: var(--easy); }
        .bd-correct { color: var(--easy); font-family: 'DM Mono', monospace; font-size: 11px; }
        .bd-wrong { color: var(--hard); font-family: 'DM Mono', monospace; font-size: 11px; }
        .result-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

        /* MODAL */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; padding: 24px; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px; max-width: 520px; width: 100%; max-height: 80vh; overflow-y: auto; }
        .modal h2 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1px; margin-bottom: 6px; }
        .modal p { font-size: 13px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
        .modal-parts { display: grid; gap: 8px; margin-bottom: 24px; }
        .modal-part-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; }
        .modal-part-row:hover { border-color: var(--accent); }
        .modal-part-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
        .modal-part-row label { flex: 1; font-size: 13px; cursor: pointer; line-height: 1.4; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .score-message { font-size: 16px; color: var(--muted); margin-bottom: 40px; line-height: 1.6; }
        .score-message strong { color: var(--text); }

        /* FILTER SECTION */
        .filter-section { margin-bottom: 32px; }
        .diff-section-title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; color: var(--muted); margin: 0 0 10px; text-transform: uppercase; }
        .diff-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 0; }
        .diff-pill { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
        .diff-pill:hover { border-color: var(--accent); color: var(--accent); }
        .diff-pill.easy.active   { background: var(--easy);   color: #0c0c0f; border-color: var(--easy); }
        .diff-pill.medium.active { background: var(--medium); color: #0c0c0f; border-color: var(--medium); }
        .diff-pill.hard.active   { background: var(--hard);   color: #fff;    border-color: var(--hard); }
        .diff-pill.all.active    { background: var(--accent); color: #0c0c0f; border-color: var(--accent); }

        /* LANGUAGE PILLS */
        .diff-pill.lang-ko.active { background: var(--accent3); color: #0c0c0f; border-color: var(--accent3); }
        .diff-pill.lang-en.active { background: var(--accent2); color: #fff;    border-color: var(--accent2); }
        .diff-pill.lang-both.active { background: var(--accent); color: #0c0c0f; border-color: var(--accent); }

        /* TYPE PILLS */
        .diff-pill.type-mcq { border-color: rgba(232,255,71,0.25); color: var(--accent); }
        .diff-pill.type-mcq.active { background: var(--accent); color: #0c0c0f; border-color: var(--accent); }
        .diff-pill.type-short { border-color: rgba(71,200,255,0.25); color: var(--accent3); }
        .diff-pill.type-short.active { background: var(--accent3); color: #0c0c0f; border-color: var(--accent3); }
        .diff-pill.type-essay { border-color: rgba(255,107,71,0.25); color: var(--accent2); }
        .diff-pill.type-essay.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }

        /* LANG BADGE on question */
        .q-lang-badge { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; padding: 3px 9px; border-radius: 4px; text-transform: uppercase; }
        .q-lang-badge.ko { background: rgba(71,200,255,0.12); color: var(--accent3); border: 1px solid rgba(71,200,255,0.25); }
        .q-lang-badge.en { background: rgba(255,107,71,0.12); color: var(--accent2); border: 1px solid rgba(255,107,71,0.25); }

        /* Short answer */
        .q-type-badge { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; padding: 3px 9px; border-radius: 4px; text-transform: uppercase; }
        .q-type-badge.mcq   { background: rgba(232,255,71,0.10); color: var(--accent);  border: 1px solid rgba(232,255,71,0.25); }
        .q-type-badge.short { background: rgba(71,200,255,0.10); color: var(--accent3); border: 1px solid rgba(71,200,255,0.25); }
        .q-type-badge.essay { background: rgba(255,107,71,0.10); color: var(--accent2); border: 1px solid rgba(255,107,71,0.25); }
        .text-answer-wrap { display: flex; flex-direction: column; gap: 12px; }
        .text-hint { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; color: var(--accent3); }
        .text-answer-input, .text-answer-textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); outline: none; transition: border-color 0.2s; }
        .text-answer-textarea { font-size: 14px; resize: vertical; min-height: 110px; line-height: 1.6; }
        .text-answer-input:focus, .text-answer-textarea:focus { border-color: var(--accent3); box-shadow: 0 0 0 3px rgba(71,200,255,0.08); }
        .text-answer-input:disabled, .text-answer-textarea:disabled { opacity: 0.55; cursor: not-allowed; }
        .text-feedback { border-radius: 10px; padding: 14px 18px; border: 1px solid; animation: fadeUp 0.3s ease; }
        .text-feedback.correct { border-color: var(--easy); background: rgba(71,232,122,0.08); }
        .text-feedback.wrong   { border-color: var(--hard); background: rgba(255,71,102,0.08); }
        .feedback-score { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .feedback-icon { font-size: 16px; }
        .text-feedback.correct .feedback-icon { color: var(--easy); }
        .text-feedback.wrong   .feedback-icon { color: var(--hard); }
        .feedback-pct { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 600; }
        .text-feedback.correct .feedback-pct { color: var(--easy); }
        .text-feedback.wrong   .feedback-pct { color: var(--hard); }
        .feedback-verdict { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); }
        .feedback-answer { font-size: 13px; line-height: 1.55; }
        .feedback-ans-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-right: 6px; }
        .feedback-ans-text { color: var(--text); font-style: italic; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
        .shake { animation: shake 0.3s ease; border-color: var(--hard) !important; }

        /* filter rows spacing */
        .filter-row { margin-bottom: 18px; }
        .filter-row:last-child { margin-bottom: 0; }
    </style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
    <div class="home-header">
        <div class="label">// Study Quiz System</div>
        <h1>MASTER<span>QUIZ</span></h1>
        <p>파트, 난이도, 언어를 선택해서 문제를 풀어보세요. 매번 새롭게 섞인 문제가 출제됩니다.</p>
    </div>

    <div class="parts-grid" id="partsGrid"></div>

    <div class="filter-section">
        <!-- DIFFICULTY -->
        <div class="filter-row">
            <div class="diff-section-title">// Difficulty</div>
            <div class="diff-pills">
                <button class="diff-pill all active" id="dpAll"  onclick="setDiff('all')">ALL</button>
                <button class="diff-pill easy"       id="dpEasy" onclick="setDiff(1)">★ EASY</button>
                <button class="diff-pill medium"     id="dpMed"  onclick="setDiff(2)">★★ MEDIUM</button>
                <button class="diff-pill hard"       id="dpHard" onclick="setDiff(3)">★★★ HARD</button>
            </div>
        </div>

        <!-- LANGUAGE -->
        <div class="filter-row">
            <div class="diff-section-title">// Language</div>
            <div class="diff-pills">
                <button class="diff-pill lang-both active" id="lpBoth" onclick="setLang('both')">🌐 KO + EN</button>
                <button class="diff-pill lang-ko"          id="lpKo"   onclick="setLang('ko')">🇰🇷 한국어</button>
                <button class="diff-pill lang-en"          id="lpEn"   onclick="setLang('en')">🇺🇸 English</button>
            </div>
        </div>

        <!-- TYPE -->
        <div class="filter-row">
            <div class="diff-section-title">// Question Type</div>
            <div class="diff-pills">
                <button class="diff-pill all active"   id="tpAll"   onclick="setType('all')">ALL</button>
                <button class="diff-pill type-mcq"     id="tpMCQ"   onclick="setType('mcq')">객관식 MCQ</button>
                <button class="diff-pill type-short"   id="tpShort" onclick="setType('short')">단답형 SHORT</button>
                <button class="diff-pill type-essay"   id="tpEssay" onclick="setType('essay')">서술형 ESSAY</button>
            </div>
        </div>
    </div>

    <div class="start-btns">
        <button class="btn btn-primary" onclick="startFullQuiz()">🎯 전체 퀴즈 시작 (30문제)</button>
        <button class="btn btn-secondary" onclick="openPartModal()">📂 파트 선택 후 시작</button>
        <button class="btn btn-all" onclick="startAllQuiz()">📋 모든 문제 풀기</button>
    </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
    <div class="quiz-header">
        <div class="quiz-progress-wrap">
            <div class="quiz-progress-label">
                <span id="qProgressLabel">문제 1 / 30</span>
                <span id="qScoreLabel">0점</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        </div>
        <button class="btn-quit" onclick="confirmQuit()">QUIT</button>
    </div>
    <div class="question-card">
        <div class="q-meta">
            <span class="q-part-tag" id="qPartTag">PART 1</span>
            <span class="q-diff" id="qDiff"><span class="q-diff-label"></span></span>
            <span class="q-lang-badge ko" id="qLangBadge">KO</span>
            <span class="q-type-badge mcq" id="qTypeBadge">MCQ</span>
        </div>
        <div class="q-text" id="qText"></div>
        <div class="options" id="optionsWrap"></div>
    </div>
    <div class="explanation" id="explanationBox">
        <div class="exp-label">// EXPLANATION</div>
        <p id="explanationText"></p>
    </div>
    <div class="quiz-actions">
        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display:none">다음 문제 →</button>
    </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
    <div class="result-score-big" id="resultScore">0%</div>
    <div class="result-label">FINAL SCORE</div>
    <p class="score-message" id="scoreMessage"></p>
    <div class="result-stats">
        <div class="stat-box correct"><div class="stat-num" id="statCorrect">0</div><div class="stat-name">CORRECT</div></div>
        <div class="stat-box wrong"><div class="stat-num" id="statWrong">0</div><div class="stat-name">WRONG</div></div>
        <div class="stat-box"><div class="stat-num" id="statTotal" style="color:var(--accent3)">0</div><div class="stat-name">TOTAL</div></div>
    </div>
    <div class="result-breakdown">
        <div class="breakdown-title">// Question Review</div>
        <div id="breakdownList"></div>
    </div>
    <div class="result-btns">
        <button class="btn btn-primary" onclick="replayQuiz()">🔄 다시 풀기</button>
        <button class="btn btn-secondary" onclick="goHome()">🏠 홈으로</button>
    </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2>파트 선택</h2>
        <p>퀴즈에 포함할 파트를 선택하세요. 선택한 파트에서 최소 2문제씩, 총 30문제가 출제됩니다.</p>
        <div class="modal-parts" id="modalParts"></div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal()">취소</button>
            <button class="btn btn-primary" onclick="startCustomQuiz()">시작</button>
        </div>
    </div>
</div>

<script>

{part:3,diff:2,lang:'ko',q:"퇴적암이 다른 암석 유형에 비해 가진 특징은?",opts:["가장 단단한 암석","지표면과 평행한 층으로 발견되며 취약함","높은 밀도","마그마에 의해 만들어짐"],ans:1,exp:"퇴적암은 Fragile(취약함)하며, 지표면과 평행하게(parallel to Earth's surface) 층을 이루며 발견됩니다."},
{part:3,diff:2,lang:'ko',q:"마그마가 빠르게 냉각될 때 형성되는 암석이 아닌 것은?",opts:["흑요석(Obsidian)","안산암(Andesite)","현무암(Basalt)","화강암(Granite)"],ans:3,exp:"화강암(Granite)은 마그마가 천천히(Slow) 냉각될 때 만들어집니다."},
{part:3,diff:3,lang:'ko',q:"변성암 형성에 중요한 역할을 하는 것은?",opts:["바람","WATER (물, 화학물질 운반)","전기력","마그마 직접 접촉"],ans:1,exp:"변성암은 퇴적암과 화성암이 WATER(물)를 통해 변환됩니다. 물이 화학물질을 운반하기 때문입니다."},
{part:3,diff:3,lang:'ko',q:"암석 변환 '퇴적암 → ?'에서 올바른 것은?",opts:["변성암 (용융)","화성암 (용융)","대기 분해","직접 분쇄 후 화성암"],ans:1,exp:"퇴적암은 Melt(용융)되어 화성암이 됩니다."},
{part:3,diff:3,lang:'ko',q:"'변성암 → _____ (더 작은 조각으로 파쇄)'에서 빈칸은?",opts:["화성암","퇴적암","마그마","기체"],ans:1,exp:"변성암은 더 작은 조각으로 파쇄(Smaller pieces broken)되어 퇴적암이 됩니다."},

/* ── PART 3  ·  English MCQ ── */
{part:3,diff:1,lang:'en',q:"What is the primary process that forms Sedimentary rock?",opts:["Cooling of magma","Accumulation of sediment","Heat and pressure metamorphism","Crystallization underwater"],ans:1,exp:"Sedimentary rock forms from accumulated sediment held together by electrical attraction."},
{part:3,diff:1,lang:'en',q:"How does Igneous rock form?",opts:["Sediment compacting","Heat and pressure","Cooled magma","Deep-sea deposits"],ans:2,exp:"Igneous rock forms from cooled magma after a volcanic eruption."},
{part:3,diff:1,lang:'en',q:"Which is an example of a Metamorphic rock?",opts:["Sandstone","Obsidian","Marble","Granite"],ans:2,exp:"Marble is a metamorphic rock. Slime Rock and Siliceous rock are also metamorphic examples."},
{part:3,diff:2,lang:'en',q:"What type of igneous rock forms from SLOW cooling of magma?",opts:["Obsidian","Andesite","Granite","Marble"],ans:2,exp:"Slow cooling produces Granite. Fast cooling produces Obsidian, Andesite, Vitreous, and Basalt."},
{part:3,diff:2,lang:'en',q:"What conditions form Metamorphic rock?",opts:["Low temperature, low pressure","High temperature and high pressure","Water erosion","Oxidation in air"],ans:1,exp:"Metamorphic rock forms under high temperature & pressure, resulting in high density."},
{part:3,diff:2,lang:'en',q:"What makes Sedimentary rock fragile compared to other rock types?",opts:["It contains no minerals","Loose particle bonding via electrical attraction","It has high density","It forms from magma"],ans:1,exp:"Sedimentary rock is Fragile because particles are loosely bonded; it's found in layers parallel to Earth's surface."},
{part:3,diff:2,lang:'en',q:"Which is NOT formed by fast cooling of magma?",opts:["Obsidian","Andesite","Basalt","Granite"],ans:3,exp:"Granite forms from slow cooling. Fast cooling produces Obsidian, Andesite, Vitreous rock, and Basalt."},
{part:3,diff:3,lang:'en',q:"What role does WATER play in metamorphic rock formation?",opts:["It directly melts rocks","It carries chemicals that drive metamorphic conversion","It erodes rock surfaces","It speeds up cooling"],ans:1,exp:"Water carries chemicals that facilitate the conversion of sedimentary and igneous rocks into metamorphic rock."},
{part:3,diff:3,lang:'en',q:"In the rock cycle, what does Sedimentary rock become when it melts?",opts:["Metamorphic rock","Igneous rock","Gas","Stays sedimentary"],ans:1,exp:"Sedimentary → Igneous (Melt). Igneous → Metamorphic (High Heat/Pressure). Metamorphic → Sedimentary (Smaller pieces broken)."},
{part:3,diff:3,lang:'en',q:"In the rock cycle, what does Metamorphic rock become when broken into smaller pieces?",opts:["Igneous rock","Sedimentary rock","Magma","Gas"],ans:1,exp:"Metamorphic rock is broken into smaller pieces (Smaller pieces broken) → becomes sediment → Sedimentary rock."},

/* ══════════════════════════════════════════════════════
   PART 4 · AQUIFERS  ·  Korean MCQ
══════════════════════════════════════════════════════ */
{part:4,diff:1,lang:'ko',q:"비제한 대수층(Unconfined Aquifer)의 주요 수원은?",opts:["지하 마그마","빙하 용해수","빗물이 토양을 통해 침투한 지하수","해수 역류"],ans:2,exp:"Unconfined Aquifer의 대부분의 지하수는 rain(빗물)이 토양을 침투(penetrating the soil)한 결과입니다."},
{part:4,diff:1,lang:'ko',q:"피압 대수층(Confined Aquifer)의 특징은?",opts:["압력이 낮음","투수성 지층 위에 위치","불투수성 층에 의해 덮여 있고 높은 압력","크기 제한 없음"],ans:2,exp:"Confined Aquifer는 돌과 점토로 형성된 불투수성 층(impermeable layer)에 의해 덮여 있으며 HIGH PRESSURE를 가집니다."},
{part:4,diff:1,lang:'ko',q:"대수층(Aquifer)의 주요 용도는?",opts:["발전소 냉각수 전용","농업과 생활용수(Farming & Domestic Life)","공업용수 전용","수상 스포츠 목적"],ans:1,exp:"대수층은 Farming(농업)과 Domestic Life(생활용수) 목적으로 사용됩니다."},
{part:4,diff:1,lang:'ko',q:"비제한 대수층(Unconfined Aquifer)의 크기 제한은?",opts:["국가 면적으로 제한","100km² 이하","크기 제한 없음(NO LIMIT)","도시 면적으로 제한"],ans:2,exp:"Unconfined Aquifer는 NO LIMIT of size(크기 제한 없음)입니다."},
{part:4,diff:2,lang:'ko',q:"두 대수층 유형 중 재충전이 더 느린 것은?",opts:["비제한 대수층(Unconfined)","피압 대수층(Confined)","둘 다 같음","계절에 따라 다름"],ans:1,exp:"Confined Aquifer는 Unconfined Aquifer보다 더 느리게 재충전(Recharges slowly)됩니다."},
{part:4,diff:2,lang:'ko',q:"대수층의 실제 사용 예시로 노트에 언급된 것은?",opts:["미시시피 강 수력발전","텍사스 에드워드 대수층(Texas Edward Aquifer)","오대호 담수 공급","캘리포니아 관개 시스템"],ans:1,exp:"Texas Edward Aquifer가 예시로 언급되었으며, 서서히 고갈되고 있습니다."},
{part:4,diff:2,lang:'ko',q:"비제한 대수층(Unconfined Aquifer)은 어떤 층 아래에 있나요?",opts:["불투수성(impermeable) 층","투수성(permeable) 층","암반 층","점토 층"],ans:1,exp:"Unconfined Aquifer는 permeable(투수성) ground(지면) 층 아래에 위치합니다."},
{part:4,diff:3,lang:'ko',q:"비제한 대수층과 피압 대수층의 위치 관계는?",opts:["피압이 위, 비제한이 아래","비제한이 위, 피압이 아래","같은 깊이","지역에 따라 다름"],ans:1,exp:"Unconfined Aquifer(비제한)가 위에, Confined Aquifer(피압)가 그 아래에 위치합니다."},
{part:4,diff:3,lang:'ko',q:"Texas Edward Aquifer의 현재 상태는?",opts:["지속적으로 증가 중","안정적으로 유지됨","서서히 고갈(slowly drying out) 중","최근 완전히 고갈됨"],ans:2,exp:"Texas Edward Aquifer는 농업과 생활용수로 활발히 사용되고 있어 slowly drying out(서서히 고갈) 중입니다."},
{part:4,diff:3,lang:'ko',q:"피압 대수층이 높은 압력을 가지는 이유는?",opts:["위치가 깊고 불투수성 층에 막혀 있기 때문","지하 마그마와 가까워서","수량이 많아서","해수와 접촉하기 때문"],ans:0,exp:"Confined Aquifer는 위에 impermeable layer(불투수성 층)이 막혀 있기 때문에 HIGH PRESSURE를 가집니다."},

/* ── PART 4  ·  English MCQ ── */
{part:4,diff:1,lang:'en',q:"What is the main source of water in an Unconfined Aquifer?",opts:["Underground magma","Glacial melt","Rainwater penetrating the soil","Reverse seawater flow"],ans:2,exp:"Most groundwater in an Unconfined Aquifer is the result of rain penetrating the soil."},
{part:4,diff:1,lang:'en',q:"What are the primary uses of aquifers?",opts:["Power plant cooling only","Farming and Domestic Life","Industrial use only","Water sports"],ans:1,exp:"Aquifers are used for Farming and Domestic Life."},
{part:4,diff:1,lang:'en',q:"What is true about the size of an Unconfined Aquifer?",opts:["Limited to a country's area","Under 100 km²","NO LIMIT in size","Limited to a city's area"],ans:2,exp:"Unconfined Aquifers have NO LIMIT of size."},
{part:4,diff:2,lang:'en',q:"Which type of aquifer recharges more slowly?",opts:["Unconfined Aquifer","Confined Aquifer","Both recharge at the same rate","Depends on season"],ans:1,exp:"Confined Aquifers recharge slowly because they are sealed by an impermeable layer above them."},
{part:4,diff:2,lang:'en',q:"What kind of layer lies above a Confined Aquifer?",opts:["Permeable ground","Impermeable layer of stone and clay","Bedrock only","Organic soil"],ans:1,exp:"Confined Aquifers are topped by an impermeable layer formed by stone and clay, creating high pressure."},
{part:4,diff:2,lang:'en',q:"What real-world aquifer is mentioned as slowly drying out?",opts:["Mississippi River aquifer","Texas Edward Aquifer","Great Lakes basin","California Central Valley"],ans:1,exp:"The Texas Edward Aquifer is slowly drying out due to heavy use for farming and domestic life."},
{part:4,diff:2,lang:'en',q:"What layer is an Unconfined Aquifer located beneath?",opts:["Impermeable layer","Permeable ground","Bedrock","Clay layer"],ans:1,exp:"Unconfined Aquifers lie beneath a layer of permeable ground, allowing rainwater to infiltrate."},
{part:4,diff:3,lang:'en',q:"What is the vertical relationship between Unconfined and Confined Aquifers?",opts:["Confined is above, Unconfined is below","Unconfined is above, Confined is below","They are at the same depth","It varies by region"],ans:1,exp:"Unconfined Aquifer sits above; Confined Aquifer is located beneath it, sealed by an impermeable layer."},
{part:4,diff:3,lang:'en',q:"Why does a Confined Aquifer have HIGH PRESSURE?",opts:["It is very deep","Sealed by an impermeable layer, water cannot escape","It has a large water volume","It is in contact with seawater"],ans:1,exp:"The impermeable layer above traps the water, building up HIGH PRESSURE in the Confined Aquifer."},
{part:4,diff:3,lang:'en',q:"Why is the Texas Edward Aquifer slowly drying out?",opts:["Natural evaporation","Heavy extraction for farming and domestic use exceeding recharge","Earthquake damage","Climate change alone"],ans:1,exp:"The Texas Edward Aquifer is slowly drying out (slowly drying out) due to intensive use for farming and domestic life."},

/* ══════════════════════════════════════════════════════
   PART 5 · NEO vs ROM  ·  Korean MCQ
══════════════════════════════════════════════════════ */
{part:5,diff:1,lang:'ko',q:"신고전주의(Neoclassicism)에서 가장 중요하게 여긴 가치는?",opts:["개인의 잠재력","자유와 혁신","질서(ORDER)","자연과 미래"],ans:2,exp:"Neoclassicism은 ORDER(질서)를 highly valued(매우 중요시)했습니다."},
{part:5,diff:1,lang:'ko',q:"낭만주의(Romanticism)에서 사회보다 중요시 여긴 것은?",opts:["전통","사회","개인(Individual)","권력"],ans:2,exp:"Romanticism은 Individual > Society, 즉 사회보다 개인을 더 중요시했습니다."},
{part:5,diff:1,lang:'ko',q:"낭만주의에서 가장 중요시한 가치는?",opts:["질서(ORDER)","전통(TRADITION)","잠재력(POTENTIAL)","이성(REASON)"],ans:2,exp:"Romanticism은 POTENTIAL(잠재력)을 highly valued(매우 중요시)했습니다."},
{part:5,diff:1,lang:'ko',q:"신고전주의(Neoclassicism)의 시간 지향성은?",opts:["자연과 미래","과거의 영광","현재에 충실(Faithful to PRESENT)","미래 혁명"],ans:2,exp:"Neoclassicism은 Faithful to PRESENT(현재에 충실)한 특징을 가집니다."},
{part:5,diff:2,lang:'ko',q:"신고전주의 작가들이 풍자(satire)와 재치(wit)를 사용한 목적은?",opts:["독자를 즐겁게 하려고","독자를 가르치고 사회의 옳고 그름을 제시하려고","상상력을 자극하려고","혁명 정신을 고취하려고"],ans:1,exp:"Neoclassicism의 의도는 독자를 가르치는 것으로, 풍자와 재치를 통해 사회의 옳고 그름을 제시했습니다."},
{part:5,diff:2,lang:'ko',q:"Jonathan Swift의 작품 스타일과 관련된 사조는?",opts:["낭만주의","인상주의","신고전주의","사실주의"],ans:2,exp:"Jonathan Swift는 Neoclassicism의 예시로, satire/wit(풍자/재치)를 사용해 당시 영국을 비판했습니다."},
{part:5,diff:2,lang:'ko',q:"신고전주의와 낭만주의의 '사회 vs 개인' 가치 비교로 올바른 것은?",opts:["신고전주의: 개인 > 사회 / 낭만주의: 사회 > 개인","신고전주의: 사회 > 개인 / 낭만주의: 개인 > 사회","둘 다 사회를 더 중요시","둘 다 개인을 더 중요시"],ans:1,exp:"Neoclassicism은 Society > Individual, Romanticism은 Individual > Society입니다."},
{part:5,diff:2,lang:'ko',q:"다음 중 낭만주의와 관련이 없는 것은?",opts:["새로운 시도를 좋아함","위험을 감수함","풍자(satire)를 통한 사회 교육","자연에 관심"],ans:2,exp:"풍자를 통한 사회 교육은 Neoclassicism의 특징입니다."},
{part:5,diff:3,lang:'ko',q:"낭만주의(Romanticism)의 특징이 아닌 것은?",opts:["위험과 도전 추구","현재에 충실(Faithful to PRESENT)","혁명과 혁신을 좋아함","상상력을 많이 활용"],ans:1,exp:"현재에 충실(Faithful to PRESENT)은 Neoclassicism의 특징입니다. Romanticism은 자연과 미래에 관심이 많았습니다."},
{part:5,diff:3,lang:'ko',q:"신고전주의 작가들이 글을 통해 제시하려 한 것은?",opts:["개인의 감정과 자유","사회의 올바른 방향과 그렇지 않은 방향(right & wrong way for society)","미래의 이상적 사회","자연의 경이로움"],ans:1,exp:"신고전주의 작가들은 writing을 통해 사회의 올바른 방향과 그릇된 방향을 제시했습니다."},

/* ── PART 5  ·  English MCQ ── */
{part:5,diff:1,lang:'en',q:"What value did Neoclassicism place highest?",opts:["Individual potential","Freedom and innovation","ORDER","Nature and the future"],ans:2,exp:"Neoclassicism highly valued ORDER — a stable, orderly society was central to its philosophy."},
{part:5,diff:1,lang:'en',q:"What did Romanticism value above all?",opts:["Order","Tradition","POTENTIAL","Reason"],ans:2,exp:"Romanticism highly valued POTENTIAL — the potential of individuals and society to grow and change."},
{part:5,diff:1,lang:'en',q:"In Neoclassicism, what is prioritized over the individual?",opts:["Nature","Society","The future","Imagination"],ans:1,exp:"Neoclassicism places Society > Individual — collective order matters more than individual expression."},
{part:5,diff:1,lang:'en',q:"What is Neoclassicism's temporal orientation?",opts:["Interested in nature and the future","Glorifying the past","Faithful to the PRESENT","Revolutionary future"],ans:2,exp:"Neoclassicism is Faithful to the PRESENT — it engages with current society and its realities."},
{part:5,diff:2,lang:'en',q:"Why did Neoclassicist writers use satire and wit?",opts:["To entertain readers","To teach readers and show society's right and wrong ways","To stimulate imagination","To inspire revolution"],ans:1,exp:"The intention of Neoclassicism was to Teach the readers — using satire and wit to show wisdom and societal right vs wrong."},
{part:5,diff:2,lang:'en',q:"Which writer is a classic example of Neoclassicism?",opts:["Jack London","Jonathan Swift","Bob Marley","Pablo Picasso"],ans:1,exp:"Jonathan Swift used satire and wit to criticize the UK of his time — a hallmark of Neoclassicism."},
{part:5,diff:2,lang:'en',q:"How do Neoclassicism and Romanticism differ on Society vs Individual?",opts:["Neo: Individual > Society / Rom: Society > Individual","Neo: Society > Individual / Rom: Individual > Society","Both prioritize society","Both prioritize the individual"],ans:1,exp:"Neoclassicism: Society > Individual. Romanticism: Individual > Society."},
{part:5,diff:2,lang:'en',q:"Which of the following is NOT associated with Romanticism?",opts:["Embraces risk and challenge","Uses lots of imagination","Uses satire to educate society","Interested in nature"],ans:2,exp:"Using satire to educate society is a Neoclassicism trait. Romanticism values imagination, nature, future, risk, and innovation."},
{part:5,diff:3,lang:'en',q:"Which is NOT a feature of Romanticism?",opts:["Pursuit of risk and challenge","Faithful to the PRESENT","Love of revolution and innovation","Heavy use of imagination"],ans:1,exp:"'Faithful to the PRESENT' is a Neoclassicism trait. Romanticism is interested in nature and the future."},
{part:5,diff:3,lang:'en',q:"What did Neoclassicist writers aim to convey through their writing?",opts:["Individual emotion and freedom","The right and wrong way for society","An ideal future society","The wonders of nature"],ans:1,exp:"Neoclassicism used writing to suggest the right and wrong ways for society, delivering this through satire and wit."},

/* ══════════════════════════════════════════════════════
   PART 6 · JACK LONDON  ·  Korean MCQ
══════════════════════════════════════════════════════ */
{part:6,diff:1,lang:'ko',q:"Jack London의 어린 시절 환경은?",opts:["부유한 귀족 가문","가난하고 어려운 환경","중산층 평범한 가정","학자 집안"],ans:1,exp:"Jack London은 Poverty(가난)한 어린 시절을 보냈으나 독학(self-educated)으로 공부했습니다."},
{part:6,diff:1,lang:'ko',q:"Jack London이 20대 초반에 참가한 것은?",opts:["해군 복무","캘리포니아 골드러시","클론다이크(Klondike) 골드러시","태평양 탐험"],ans:2,exp:"Jack London은 캐나다 Klondike에서 골드러시에 참여했으며 광부(miner)로 활동했습니다."},
{part:6,diff:1,lang:'ko',q:"Jack London의 대표작 'The Call of the Wild'와 'White Fang'의 공통 테마는?",opts:["사랑과 로맨스","인류 vs 자연, 인간 vs 인간","사회 계급과 경제 문제","모험과 탐험"],ans:1,exp:"두 작품 모두 Humanity vs Nature, Man vs Man을 다루었습니다."},
{part:6,diff:2,lang:'ko',q:"'Martin Eden'(1909)의 주요 테마는?",opts:["자연과 생존","사회 계급 분열과 개인주의(social class divisions & individualism)","전쟁과 평화","탐험과 모험"],ans:1,exp:"'Martin Eden'은 social class divisions(사회 계급 분열)과 individualism(개인주의)을 다루었습니다."},
{part:6,diff:2,lang:'ko',q:"Jack London의 30대 초반에 한 특별한 모험은?",opts:["아마존 탐험","아프리카 사파리","요트 'Snark'로 태평양 2년 항해","북극 탐험"],ans:2,exp:"Jack London은 요트 'Snark'로 태평양을 2년간 항해하는 모험을 떠났습니다."},
{part:6,diff:2,lang:'ko',q:"Jack London의 작품에 영향을 준 경험은?",opts:["부유한 가정에서의 편안한 생활","가혹하고 냉혹한 환경(harsh, relentless atmosphere)의 경험","파리 유학 시절","정치 활동"],ans:1,exp:"초기의 harsh, relentless atmosphere 경험이 작품에 큰 영향을 미쳤습니다."},
{part:6,diff:3,lang:'ko',q:"Jack London의 작품 세계관을 가장 잘 표현한 것은?",opts:["낭만적 사랑을 추구","강한 의지와 자신의 신념대로 살아가는 삶(high power of will)","사회 체제에 순응","물질적 성공 추구"],ans:1,exp:"Jack London의 글은 high power of will(강한 의지)을 특징으로 하며, 자신의 신념을 가지고 그 신념대로 살았습니다."},
{part:6,diff:3,lang:'ko',q:"'Martin Eden'이 출판된 시기와 당시 Jack London의 상황은?",opts:["젊은 시절 Klondike에서","유명해진 후 태평양 항해 중","은퇴 후","정치 활동 시절"],ans:1,exp:"'Martin Eden'(1909)은 Jack London이 유명해진 후 요트 'Snark'로 태평양을 항해하는 동안 출판됐습니다."},

/* ── PART 6  ·  English MCQ ── */
{part:6,diff:1,lang:'en',q:"How would you describe Jack London's childhood?",opts:["Wealthy nobility","Poor and self-educated despite hardship","Middle-class and ordinary","Scholarly family background"],ans:1,exp:"Jack London grew up in poverty but was nevertheless self-educated."},
{part:6,diff:1,lang:'en',q:"What did Jack London do in his early 20s that heavily influenced his writing?",opts:["Joined the navy","Participated in the California Gold Rush","Joined the Klondike Gold Rush as a miner","Sailed the Pacific"],ans:2,exp:"Jack London participated in the Klondike (Canada) Gold Rush as a miner — this harsh experience deeply influenced his early works."},
{part:6,diff:1,lang:'en',q:"What are the main themes of 'The Call of the Wild' and 'White Fang'?",opts:["Love and romance","Humanity vs Nature / Man vs Man","Social class and economics","Adventure only"],ans:1,exp:"Both works explore Humanity vs Nature and Man vs Man — themes born from London's Klondike experience."},
{part:6,diff:2,lang:'en',q:"What themes does 'Martin Eden' (1909) explore?",opts:["Nature and survival","Social class divisions and individualism","War and peace","Adventure and exploration"],ans:1,exp:"'Martin Eden' explores social class divisions and individualism — written during London's Pacific voyage on the 'Snark'."},
{part:6,diff:2,lang:'en',q:"What notable adventure did Jack London undertake in his early 30s?",opts:["Amazon expedition","African safari","2-year Pacific voyage on yacht 'Snark'","Arctic exploration"],ans:2,exp:"Despite fame and fortune, London was not satisfied — he sailed the Pacific for 2 years on his yacht 'Snark'."},
{part:6,diff:2,lang:'en',q:"What atmosphere from Jack London's past most influenced his early writing?",opts:["Comfortable wealthy life","The harsh, relentless atmosphere of his early experiences","Years studying in Paris","Political campaigning"],ans:1,exp:"The harsh, relentless atmosphere of London's early life — poverty, Klondike hardship — gave his early works their distinctive tone."},

{part:6,diff:3,lang:'en',q:"When was 'Martin Eden' published, and where was London at the time?",opts:["During his Klondike years","While on his Pacific voyage aboard the 'Snark'","After retirement","During his political years"],ans:1,exp:"'Martin Eden' (1909) was published while Jack London was on his 2-year Pacific voyage on the yacht 'Snark'."},

{part:7,diff:1,lang:'ko',q:"지구형 행성(Terrestrial Planets)에 해당하는 것은?",opts:["목성, 토성, 천왕성, 해왕성","수성, 금성, 지구, 화성","수성, 금성, 목성, 토성","지구, 화성, 목성, 천왕성"],ans:1,exp:"지구형 행성(Terrestrial Planets)은 Mercury(수성), Venus(금성), Earth(지구), Mars(화성)입니다."},
{part:7,diff:1,lang:'ko',q:"목성형 행성(Jovian Planets)이 가스 행성인 이유는?",opts:["태양 폭발로 가스 생성","태양과의 거리로 대기가 냉각·응고됨","충돌로 가스 방출","행성 내부 핵이 가스 생성"],ans:1,exp:"목성형 행성은 태양과의 거리가 멀어 대기가 냉각되고 응고됩니다."},
{part:7,diff:1,lang:'ko',q:"지구와 화성의 공통점은?",opts:["이산화탄소 대기","위성 없음","자전 주기 약 1일(1 day rotation period)","물과 산소 보유"],ans:2,exp:"Earth(지구)와 Mars(화성) 모두 1 day rotation period(약 1일의 자전 주기)를 가집니다."},
{part:7,diff:2,lang:'ko',q:"금성(Venus)의 특징으로 올바른 것은?",opts:["산소와 물 보유","이산화탄소 구름으로 둘러싸여 있고 역방향 자전","진공 상태 유지","자기장이 없음"],ans:1,exp:"Venus(금성)은 CO2 clouds로 둘러싸여 있으며, 약 한 달에 한 번 반대 방향(opposite direction)으로 자전합니다."},
{part:7,diff:2,lang:'ko',q:"화성(Mars)이 지구와 다른 점은?",opts:["자전 주기가 매우 짧음","이산화탄소 대기가 없음","자기장이 전혀 없음","달이 없음"],ans:2,exp:"Mars(화성)는 자기장이 아예 없습니다. 지구는 차별화된 magnetic poles를 가지고 있습니다."},
{part:7,diff:2,lang:'ko',q:"지구형 행성 중 위성(moon)이 없는 행성들은?",opts:["지구와 화성","수성과 금성","수성과 화성","금성과 지구"],ans:1,exp:"수성(Mercury)과 금성(Venus)은 위성이 없고, 지구는 1개, 화성은 2개의 위성을 가집니다."},
{part:7,diff:2,lang:'ko',q:"지구가 다른 지구형 행성과 구별되는 특징은?",opts:["역방향 자전","진공 상태 유지","산소와 물 보유","CO2 구름"],ans:2,exp:"Earth(지구)는 oxygen(산소)과 water(물)를 보유하고 있는 점이 특징입니다."},
{part:7,diff:3,lang:'ko',q:"목성형 행성이 지구형 행성보다 많이 가진 것은?",opts:["고체 표면 면적","핵(core)의 크기","위성(moons)의 수와 자전 속도","산소 대기"],ans:2,exp:"목성형 행성은 지구형 행성보다 위성이 더 많고 더 빠르게 자전합니다. 또한 ring system을 가집니다."},
{part:7,diff:3,lang:'ko',q:"수성(Mercury)의 특징은?",opts:["산소와 물 풍부","CO2 구름으로 둘러싸임","진공에 가까운 상태(near-vacuum), 한 달에 한 번 자전","자기장이 없음"],ans:2,exp:"Mercury(수성)는 near-vacuum(진공에 가까운 상태)을 유지하며, 약 1달에 한 번 자전합니다."},
{part:7,diff:3,lang:'ko',q:"목성형 행성의 공통적인 특징은?",opts:["고체 표면과 적은 대기","작은 크기, 느린 자전","수소와 헬륨으로 구성, 고리 시스템 보유","자기장 없음, 위성 없음"],ans:2,exp:"목성형 행성은 LARGE하고, 수소와 헬륨으로 구성되어 있으며, Ring system을 가집니다."},

/* ── PART 7  ·  English MCQ ── */
{part:7,diff:1,lang:'en',q:"Which planets are classified as Terrestrial Planets?",opts:["Jupiter, Saturn, Uranus, Neptune","Mercury, Venus, Earth, Mars","Mercury, Venus, Jupiter, Saturn","Earth, Mars, Jupiter, Uranus"],ans:1,exp:"The Terrestrial Planets are Mercury, Venus, Earth, and Mars."},
{part:7,diff:1,lang:'en',q:"Why are Jovian Planets considered gas planets?",opts:["Solar explosions created gas","Their distance from the Sun causes atmospheres to cool and solidify as gas","Collisions released gas","Internal cores generate gas"],ans:1,exp:"Jovian Planets formed far from the Sun — their atmospheres cooled and solidified, making them GAS PLANETS."},
{part:7,diff:1,lang:'en',q:"What do Earth and Mars have in common?",opts:["Carbon dioxide atmosphere","No moons","Approximately 1-day rotation period","Oxygen and water"],ans:2,exp:"Both Earth and Mars have approximately a 1-day rotation period."},
{part:7,diff:2,lang:'en',q:"What makes Venus unique in terms of rotation?",opts:["It rotates the fastest","It rotates in the opposite direction to most planets","It doesn't rotate","It rotates exactly like Earth"],ans:1,exp:"Venus rotates in the opposite direction (reverse rotation) about once per month."},
{part:7,diff:2,lang:'en',q:"How does Mars differ from Earth regarding magnetic fields?",opts:["Mars has a stronger magnetic field","Mars has no magnetic field at all","Both have identical magnetic fields","Mars has more magnetic poles"],ans:1,exp:"Mars has no magnetic field at all, unlike Earth which has differentiated magnetic poles."},
{part:7,diff:2,lang:'en',q:"Which Terrestrial Planets have NO moons?",opts:["Earth and Mars","Mercury and Venus","Mercury and Mars","Venus and Earth"],ans:1,exp:"Mercury and Venus have no moons. Earth has 1, Mars has 2 — totaling 3 moons for all Terrestrial Planets."},
{part:7,diff:2,lang:'en',q:"What distinguishes Earth from all other Terrestrial Planets?",opts:["Reverse rotation","Near-vacuum atmosphere","Possesses oxygen and water","CO₂ cloud cover"],ans:2,exp:"Earth uniquely possesses oxygen and water among the Terrestrial Planets."},
{part:7,diff:3,lang:'en',q:"What do Jovian Planets have more of compared to Terrestrial Planets?",opts:["Solid surface area","Core size","Number of moons and rotation speed","Oxygen atmosphere"],ans:2,exp:"Jovian Planets have more moons and spin faster (more spins). They also all have ring systems."},
{part:7,diff:3,lang:'en',q:"What characterizes Mercury's atmosphere?",opts:["Rich in oxygen and water","Thick CO₂ clouds","Near-vacuum state; rotates once per month","No magnetic field"],ans:2,exp:"Mercury maintains a near-vacuum state and rotates approximately once per month."},
{part:7,diff:3,lang:'en',q:"Which statement correctly describes ALL Jovian Planets?",opts:["Small, slow rotation, few moons","Large, hydrogen and helium composition, ring systems","No magnetic field, no moons","Solid surface, thin atmosphere"],ans:1,exp:"Jovian Planets are LARGE, composed of hydrogen and helium, spin faster than Terrestrial Planets, and each has a ring system."},

{part:8,diff:1,lang:'ko',q:"명왕성(Pluto)은 언제 발견되었나요?",opts:["1900년","1920년","1930년","1945년"],ans:2,exp:"Pluto는 1930년 Tombough에 의해 발견되었습니다."},
{part:8,diff:1,lang:'ko',q:"Charon은 무엇인가요?",opts:["명왕성과 비슷한 왜소행성","명왕성의 위성(moon)","카이퍼 벨트의 한 천체","에리스의 위성"],ans:1,exp:"Charon(카론)은 1978년 발견된 Pluto의 moon(위성)입니다."},
{part:8,diff:1,lang:'ko',q:"명왕성이 왜소행성(Dwarf Planet)으로 재분류된 직접적인 계기는?",opts:["크기가 달보다 작아서","Eris 발견으로 행성 정의가 재검토됨","New Horizons 탐사 결과","Charon 발견으로"],ans:1,exp:"2005년 Mike Brown이 Pluto보다 25% 더 무거운 Eris를 발견하면서 행성 정의가 재검토되어 Pluto가 Dwarf Planet이 되었습니다."},
{part:8,diff:2,lang:'ko',q:"카론(Charon) 발견의 의미는?",opts:["명왕성이 행성임을 확정","명왕성의 크기를 어렴풋이 추정 가능하게 함","명왕성 표면을 최초 촬영","카이퍼 벨트의 존재 확인"],ans:1,exp:"1978년 Charon 발견으로 Pluto의 크기를 약 2,300km로 어렴풋이 추정할 수 있게 되었습니다."},
{part:8,diff:2,lang:'ko',q:"카이퍼 벨트(Kuiper Belt)에 대한 설명으로 올바른 것은?",opts:["명왕성보다 훨씬 큰 천체들의 집합","약 70,000개의 천체가 포함된 벨트","소행성대와 동일한 위치","태양과 가장 가까운 소행성 지대"],ans:1,exp:"Kuiper Belt는 약 70,000개의 천체를 포함하며, Pluto는 이것의 일부로 여겨지기도 했습니다."},
{part:8,diff:2,lang:'ko',q:"Pluto의 지름(크기)은 대략 얼마로 추정되나요?",opts:["약 500km","약 1,000km","약 2,300km","약 5,000km"],ans:2,exp:"Charon 발견 후 Pluto의 크기는 약 2,300km로 추정할 수 있게 되었습니다."},
{part:8,diff:3,lang:'ko',q:"에리스(Eris)와 명왕성의 질량 비교는?",opts:["에리스가 명왕성보다 25% 더 무거움","명왕성이 에리스보다 더 무거움","거의 동일","에리스가 50% 더 무거움"],ans:0,exp:"2005년 발견된 Eris는 Pluto보다 25% more massive(25% 더 무거움)했습니다."},
{part:8,diff:3,lang:'ko',q:"'New Horizons'가 명왕성에 파견된 년도와 그 의미는?",opts:["2005년, 에리스 탐사","2015년, 명왕성이 여전히 과학계에서 중요하다는 것을 알림","1978년, 카론 발견","1930년, 명왕성 최초 발견"],ans:1,exp:"2015년 'New Horizons'가 Pluto에 파견되었으며, 이는 Pluto가 여전히 업계에서 중요하게 거론된다는 것을 보여줍니다."},
{part:8,diff:3,lang:'ko',q:"명왕성을 왜소행성으로 재정의하게 된 과정의 순서로 올바른 것은?",opts:["Pluto발견→Eris발견→Charon발견→왜소행성 재정의","Pluto발견→Charon발견→Eris발견→왜소행성 재정의","Charon발견→Pluto발견→Eris발견→왜소행성 재정의","Eris발견→Pluto발견→Charon발견"],ans:1,exp:"1930 Pluto 발견→1978 Charon 발견→2005 Eris 발견→행성 재정의→Pluto가 Dwarf Planet됨→2015 New Horizons 파견"},

/* ── PART 8  ·  English MCQ ── */
{part:8,diff:1,lang:'en',q:"In what year was Pluto discovered?",opts:["1900","1920","1930","1945"],ans:2,exp:"Pluto was discovered by Tombough in 1930, though its size was not clearly identified at the time."},
{part:8,diff:1,lang:'en',q:"What is Charon?",opts:["A dwarf planet similar to Pluto","Pluto's moon","A Kuiper Belt object","Eris's moon"],ans:1,exp:"Charon is Pluto's moon, discovered in 1978."},
{part:8,diff:1,lang:'en',q:"What directly triggered Pluto's reclassification as a Dwarf Planet?",opts:["Its size is smaller than the Moon","The discovery of Eris prompted a redefinition of 'planet'","Results from the New Horizons mission","The discovery of Charon"],ans:1,exp:"In 2005, Mike Brown discovered Eris — 25% more massive than Pluto — causing a redefinition of what a planet is."},
{part:8,diff:2,lang:'en',q:"What was the significance of discovering Charon?",opts:["It confirmed Pluto was a planet","It allowed an approximate estimate of Pluto's size (~2,300 km)","It was the first photograph of Pluto's surface","It confirmed the Kuiper Belt"],ans:1,exp:"The discovery of Charon (1978) allowed scientists to estimate Pluto's diameter at approximately 2,300 km."},
{part:8,diff:2,lang:'en',q:"How many objects does the Kuiper Belt contain?",opts:["About 1,000","About 10,000","About 70,000","About 1,000,000"],ans:2,exp:"The Kuiper Belt contains approximately 70,000 objects. Pluto was once considered part of it."},
{part:8,diff:2,lang:'en',q:"What is Pluto's estimated diameter?",opts:["~500 km","~1,000 km","~2,300 km","~5,000 km"],ans:2,exp:"Following Charon's discovery, Pluto's size was estimated at approximately 2,300 km wide."},
{part:8,diff:3,lang:'en',q:"How does Eris compare to Pluto in terms of mass?",opts:["Eris is 25% more massive than Pluto","Pluto is heavier than Eris","They are nearly identical","Eris is 50% more massive"],ans:0,exp:"Eris, discovered by Mike Brown in 2005, is 25% more massive than Pluto — prompting the redefinition of 'planet'."},
{part:8,diff:3,lang:'en',q:"What is the significance of the 2015 'New Horizons' mission to Pluto?",opts:["It reclassified Pluto as a planet","It showed that Pluto remains scientifically important","It discovered Eris","It found Pluto's first moon"],ans:1,exp:"The New Horizons probe sent to Pluto in 2015 demonstrated that Pluto is still highly relevant and discussed in the scientific community."},
{part:8,diff:3,lang:'en',q:"What is the correct chronological order of key events in Pluto's history?",opts:["Pluto→Eris→Charon→Dwarf Planet","Pluto→Charon→Eris→Dwarf Planet→New Horizons","Charon→Pluto→Eris→Dwarf Planet","Eris→Pluto→Charon→Dwarf Planet"],ans:1,exp:"1930: Pluto discovered → 1978: Charon discovered → 2005: Eris discovered → Pluto reclassified as Dwarf Planet → 2015: New Horizons sent."},

{part:9,diff:1,lang:'ko',q:"재즈의 시간적 발전 순서로 올바른 것은?",opts:["Swing→Dixieland→Hot Jazz→Bebop","Bebop→Swing→Hot Jazz→Dixieland","Dixieland→Hot Jazz(1920s)→Swing(1930s)→Bebop(1940-50s)","Hot Jazz→Dixieland→Bebop→Swing"],ans:2,exp:"Dixieland(19세기 말~1910s)→Hot Jazz(1920s)→Swing(1930s)→Bebop(1940~50s) 순서로 발전했습니다."},

{part:9,diff:2,lang:'ko',q:"1930년대 Swing에서 새롭게 추가된 요소는?",opts:["즉흥 연주와 감정 표현","추상적인 화음 구조","댄스와 빠른 템포(upbeat tempo & dance)","소규모 앙상블"],ans:2,exp:"Swing(1930s)에서는 Upbeat tempo(빠른 템포)와 dance(댄스)가 추가되었습니다."},

{part:9,diff:3,lang:'ko',q:"Dixieland Jazz의 근본적인 특징은?",opts:["정형화된 악보 중심","즉각적, 감정적, 즉흥적(instant, emotional, impulsive)","대규모 오케스트라","클래식 화성 기반"],ans:1,exp:"Dixieland Jazz의 근본은 instant(즉각적), emotional(감정적), impulsive(즉흥적)입니다."},

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
}
function getDiffInfo(d) {
    if (d===1) return {label:'EASY',   stars:'★☆☆', cls:'easy'};
    if (d===2) return {label:'MEDIUM', stars:'★★☆', cls:'medium'};
    return              {label:'HARD',   stars:'★★★', cls:'hard'};
}
function matchesLang(q, lang) {
    if (lang === 'both') return true;
    return (q.lang || 'ko') === lang;
}

function buildQuiz(partIds, diffs, lang, types) {
    const TOTAL = 30, MIN = 2;
    const activeDiffs = diffs && diffs.length ? diffs : [1,2,3];
    const activeTypes = types && types.length ? types : ['mcq','short','essay'];
    const activeLang  = lang || 'both';

    const pools = {};
    partIds.forEach(pid => {
        pools[pid] = shuffle(QUESTIONS.filter(q =>
            q.part === pid &&
            activeDiffs.includes(q.diff) &&
            activeTypes.includes(q.type || 'mcq') &&
            matchesLang(q, activeLang)
        ));
    });

    // check if any questions exist at all
    const totalAvail = partIds.reduce((s, pid) => s + pools[pid].length, 0);
    if (totalAvail === 0) return [];

    const selected = [];
    partIds.forEach(pid => {
        const take = pools[pid].splice(0, MIN);
        take.forEach(q => selected.push({...q}));
    });

    const rest = shuffle(partIds.flatMap(pid => pools[pid]));
    for (const q of rest) {
        if (selected.length >= TOTAL) break;
        selected.push({...q});
    }

    return shuffle(selected).map(q => {
        if (q.type === 'short' || q.type === 'essay') return {...q};
        const correctText = q.opts[q.ans];
        const so = shuffle(q.opts);
        return {...q, opts: so, ans: so.indexOf(correctText)};
    });
}

// ═══════════════════════════════════════════════════════
// SIMILARITY (for short/essay)
// ═══════════════════════════════════════════════════════
function normalizeText(s) { return s.toLowerCase().trim().replace(/[^a-z0-9\s가-힣]/g,'').replace(/\s+/g,' '); }
function levenshtein(a,b) {
    const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
    for(let i=1;i<=m;i++) for(let j=1;j<=n;j++) dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
    return dp[m][n];
}
function similarityScore(input, correct) {
    const a=normalizeText(input),b=normalizeText(correct);
    if(!a||!b) return 0;
    if(a===b) return 1.0;
    if(b.includes(a)||a.includes(b)) return 0.9;
    const maxLen=Math.max(a.length,b.length);
    const levScore=maxLen>0?1-levenshtein(a,b)/maxLen:0;
    const aWords=new Set(a.split(' ').filter(w=>w.length>2));
    const bWords=[...b.split(' ').filter(w=>w.length>2)];
    const overlap=bWords.filter(w=>aWords.has(w)).length;
    const wordScore=bWords.length>0?overlap/bWords.length:0;
    return Math.max(levScore*0.35+wordScore*0.65, levScore);
}

// ANSWER HANDLERS
// ═══════════════════════════════════════════════════════
function selectAnswer(idx) {
    if (state.answered) return;
    state.answered = true;
    const q = state.quizQuestions[state.currentIdx];
    const opts = document.querySelectorAll('.option');
    const ok = idx === q.ans;
    opts.forEach(o => o.disabled = true);
    opts[idx].classList.add(ok ? 'correct' : 'wrong');
    if (!ok) opts[q.ans].classList.add('correct');
    state.results.push(ok);
    document.getElementById('qScoreLabel').textContent = `${state.results.filter(r=>r).length}점`;
    document.getElementById('explanationText').textContent = q.exp;
    document.getElementById('explanationBox').classList.add('show');
    document.getElementById('nextBtn').style.display = 'block';
}

function submitTextAnswer() {
    if (state.answered) return;
    const inp = document.getElementById('textAnswerInput');
    if (!inp) return;
    const userInput = inp.value.trim();
    if (!userInput) {
        inp.classList.add('shake');
        setTimeout(() => inp.classList.remove('shake'), 400);
        return;
    }
    state.answered = true;
    inp.disabled   = true;
    const btn = document.getElementById('submitTextBtn');
    if (btn) btn.disabled = true;

    const q     = state.quizQuestions[state.currentIdx];
    const qtype = q.type || 'mcq';
    let score   = 0;

    if (qtype === 'short') {
        score = similarityScore(userInput, q.ans);
        if (q.keywords && q.keywords.length) {
            const ni = normalizeText(userInput);
            const kwHit = q.keywords.filter(kw => ni.includes(kw.toLowerCase())).length / q.keywords.length;
            score = Math.max(score, kwHit >= 1 ? 0.9 : kwHit >= 0.5 ? 0.75 : score);
        }
    } else if (qtype === 'essay') {
        const ni  = normalizeText(userInput);
        const kws = q.keywords || [];
        const matched = kws.filter(kw => ni.includes(kw.toLowerCase())).length;
        const kwScore  = kws.length > 0 ? matched/kws.length : similarityScore(userInput, q.ans);
        const simScore = similarityScore(userInput, q.ans);
        score = Math.max(kwScore*0.7 + simScore*0.3, kwScore);
    }

    const correct = qtype === 'essay' ? score >= 0.5 : score >= 0.7;
    const pct     = Math.round(score * 100);
    const wrap    = document.getElementById('optionsWrap');
    const fb      = document.createElement('div');
    fb.className  = `text-feedback ${correct ? 'correct' : 'wrong'}`;
    fb.innerHTML  = `
        <div class="feedback-score">
            <span class="feedback-icon">${correct ? '✓' : '✗'}</span>
            <span class="feedback-pct">${pct}% match</span>
            <span class="feedback-verdict">${correct ? 'CORRECT' : 'INCORRECT'}</span>
        </div>
        <div class="feedback-answer">
            <span class="feedback-ans-label">Model Answer:</span>
            <span class="feedback-ans-text">${q.ans}</span>
        </div>`;
    wrap.appendChild(fb);

    state.results.push(correct);
    document.getElementById('qScoreLabel').textContent = `${state.results.filter(r=>r).length}점`;
    document.getElementById('explanationText').textContent = q.exp;
    document.getElementById('explanationBox').classList.add('show');
    document.getElementById('nextBtn').style.display = 'block';
}

// ═══════════════════════════════════════════════════════
// NEXT / RESULT
// ═══════════════════════════════════════════════════════
function nextQuestion() {
    state.currentIdx++;
    if (state.currentIdx >= state.quizQuestions.length) showResult();
    else renderQuestion();
}

function showResult() {
    showScreen('result');
    const ok    = state.results.filter(r=>r).length;
    const total = state.quizQuestions.length;
    const pct   = total > 0 ? Math.round((ok/total)*100) : 0;
    document.getElementById('resultScore').textContent  = pct+'%';
    document.getElementById('statCorrect').textContent  = ok;
    document.getElementById('statWrong').textContent    = total-ok;
    document.getElementById('statTotal').textContent    = total;
    let msg = '';
    if (pct>=90) msg='🏆 완벽합니다! <strong>최고의 성과</strong>를 보여줬어요!';
    else if (pct>=70) msg='🎉 훌륭해요! 조금만 더 하면 <strong>완벽</strong>해질 거예요.';
    else if (pct>=50) msg='💪 중간 수준이에요. <strong>틀린 문제</strong>를 다시 복습해보세요.';
    else msg='📚 아직 공부가 더 필요해요. <strong>열심히</strong> 복습하면 올라갑니다!';
    document.getElementById('scoreMessage').innerHTML = msg;

    const list = document.getElementById('breakdownList');
    list.innerHTML = state.quizQuestions.map((q,i) => {
        const r    = state.results[i];
        const part = PARTS.find(p=>p.id===q.part);
        const ansText = (q.type==='short'||q.type==='essay') ? q.ans : q.opts[q.ans];
        return `<div class="breakdown-item">
            <span class="bd-icon">${r?'✓':'✗'}</span>
            <div class="bd-q">
                <div style="font-size:11px;color:var(--muted);margin-bottom:3px">
                    Part ${q.part} · ${part.short}
                    <span style="margin-left:4px;padding:1px 6px;border-radius:3px;font-size:10px;background:${(q.lang||'ko')==='en'?'rgba(255,107,71,.15)':'rgba(71,200,255,.15)'}; color:${(q.lang||'ko')==='en'?'var(--accent2)':'var(--accent3)'};">${(q.lang||'ko').toUpperCase()}</span>
                </div>
                ${q.q}
                ${!r ? `<div class="bd-ans">정답: <span>${ansText}</span></div>` : ''}
            </div>
            <span class="${r?'bd-correct':'bd-wrong'}">${r?'맞음':'틀림'}</span>
        </div>`;
    }).join('');
}

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
}
function goHome()      { showScreen('home'); }
function confirmQuit() { if (confirm('퀴즈를 그만하시겠어요?')) goHome(); }

initHome();
</script>

</html>
